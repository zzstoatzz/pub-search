name: Ingestion Watchdog

# Pings @zzstoatzz.io on bsky if ingestion freshness or serving health fails.
# Freshness = max(indexed_at) in turso (catches the whole ingest chain dying);
# serving = backend endpoints with bodies inspected. tap is decommissioned —
# see docs/retro-2026-06-10-cutover-cascade.md.
#
# Requires repo secrets: ATPROTO_HANDLE, ATPROTO_PASSWORD, TURSO_DB_TOKEN,
# FLY_API_TOKEN.

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 min
  workflow_dispatch: # allow manual trigger

jobs:
  builder-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Bound and recover the snapshot builder
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: ./scripts/guard-snapshot-builder

  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check ingestion (posts to bsky + fails the run if stalled)
        env:
          ATPROTO_HANDLE: ${{ secrets.ATPROTO_HANDLE }}
          ATPROTO_PASSWORD: ${{ secrets.ATPROTO_PASSWORD }}
          TURSO_DB_TOKEN: ${{ secrets.TURSO_DB_TOKEN }}
        run: ./scripts/ingestion-watchdog
