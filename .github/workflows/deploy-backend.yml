name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'banned-dids.txt'

concurrency:
  group: backend-deploy
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # banned-dids.txt is the repo-root single source of truth; the backend
      # build context is backend/, so stage a copy in before the remote build.
      - name: Stage shared banned-dids.txt
        run: cp banned-dids.txt backend/banned-dids.txt

      - name: Deploy to Fly.io
        working-directory: backend
        run: flyctl deploy --remote-only
