name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'banned-dids.txt'
      - 'kept-dids.txt'
      - 'scripts/reconcile-snapshot-builder'
      - 'scripts/guard-snapshot-builder'
      - 'scripts/fly_machines.py'
      - 'scripts/watchdog_checks.py'
      - 'scripts/tests/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: backend-deploy
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test operational guards
        run: python3 -m unittest discover -s scripts/tests -v

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Test backend
        working-directory: backend
        run: zig build test --summary all

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # banned-dids.txt is the repo-root single source of truth; the backend
      # build context is backend/, so stage a copy in before the remote build.
      - name: Stage shared DID lists
        run: cp banned-dids.txt kept-dids.txt backend/

      - name: Deploy to Fly.io
        working-directory: backend
        run: flyctl deploy --remote-only

      # Scheduled Machines pin image digests and are not updated by fly deploy.
      # Reconcile after serving deploys so builder code, schema, and policy
      # cannot drift. Interrupting an old build is safe: latest.json is written
      # only after the complete artifact and manifest.
      - name: Reconcile scheduled snapshot builder
        run: ./scripts/reconcile-snapshot-builder --version "$GITHUB_SHA"
