<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>pub search</title>
  <meta name="description" content="search atproto publishing platforms">
  <meta property="og:title" content="pub search">
  <meta property="og:description" content="search atproto publishing platforms">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="pub search">
  <meta name="twitter:description" content="search atproto publishing platforms">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0a0a0a;
      color: #ccc;
      min-height: 100vh;
      padding: 1rem;
      font-size: 14px;
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    a { color: #1B7340; text-decoration: none; }
    a:hover { color: #2a9d5c; }

    h1 {
      font-size: 12px;
      font-weight: normal;
      margin-bottom: 1.5rem;
    }

    h1 a.title {
      color: #888;
    }

    h1 a.title:hover {
      color: #fff;
    }

    h1 a.src {
      font-size: 10px;
      color: #444;
    }

    h1 a.stats-link {
      font-size: 10px;
      color: #553;
    }

    h1 a.stats-link:hover {
      color: #d4956a;
    }

    h1 .by {
      font-size: 10px;
      color: #555;
    }

    h1 .by a {
      color: #555;
    }

    h1 .by a:hover {
      color: #1B7340;
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.5rem;
      font-family: monospace;
      font-size: 16px; /* prevents iOS auto-zoom on focus */
      background: #111;
      border: 1px solid #333;
      color: #ccc;
    }

    input[type="text"]:focus { outline: 1px solid #1B7340; }

    button {
      padding: 0.5rem 1rem;
      font-family: monospace;
      font-size: 14px;
      background: #111;
      border: 1px solid #333;
      color: #ccc;
      cursor: pointer;
    }

    button:hover { background: #222; }
    button:disabled { color: #555; cursor: not-allowed; }

    .results {
      display: flex;
      flex-direction: column;
    }

    .result {
      border-bottom: 1px solid #222;
      padding: 1rem 0;
    }

    .result:hover { background: #111; margin: 0 -0.5rem; padding: 1rem 0.5rem; }

    .result-title {
      color: #fff;
      margin-bottom: 0.5rem;
      /* prevent long titles from breaking layout */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    .result-title a { color: inherit; }
    .result-title a:hover { color: #2a9d5c; }

    .result-snippet {
      font-size: 12px;
      color: #888;
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .result-snippet mark {
      background: rgba(27, 115, 64, 0.3);
      color: #2a9d5c;
      padding: 0 2px;
    }

    .result-meta {
      font-size: 11px;
      color: #555;
    }

    .author-name a {
      color: #888;
      text-decoration: none;
    }

    .author-name a:hover {
      color: #2a9d5c;
    }

    .entity-type {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-right: 8px;
      text-transform: lowercase;
    }

    .entity-type.article {
      background: rgba(27, 115, 64, 0.2);
      color: #2a9d5c;
    }

    .entity-type.looseleaf {
      background: rgba(100, 100, 100, 0.2);
      color: #888;
    }

    .entity-type.publication {
      background: rgba(64, 115, 180, 0.2);
      color: #6a9fd4;
    }

    .platform-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-right: 8px;
      text-transform: lowercase;
      background: rgba(180, 100, 64, 0.2);
      color: #d4956a;
    }

    .status {
      padding: 1rem;
      text-align: center;
      color: #666;
    }

    .error { color: #c44; }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #555;
    }

    .empty-state p { margin-bottom: 0.5rem; }

    .suggestions {
      font-size: 11px;
      color: #444;
      margin-bottom: 1.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .suggestions-label {
      color: #555;
      margin-right: 0.25rem;
    }

    .suggestions-list {
      display: inline;
    }

    .suggestion {
      color: #666;
      cursor: pointer;
      font-style: italic;
    }

    .suggestion::before {
      content: '"';
      color: #444;
    }

    .suggestion::after {
      content: '"';
      color: #444;
      margin-right: 0.5rem;
    }

    .suggestion:hover {
      color: #2a9d5c;
    }

    .suggestion:hover::before,
    .suggestion:hover::after {
      color: #2a9d5c;
    }

    .stats {
      font-size: 11px;
      color: #555;
      margin-top: 1.5rem;
      text-align: center;
    }

    .related-section {
      margin-top: 1rem;
      padding-top: 0;
    }

    .related-header {
      font-size: 11px;
      color: #444;
      margin-bottom: 0.75rem;
    }

    .related-loading {
      font-size: 11px;
      color: #666;
      margin-top: 1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    .related-items {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .related-item {
      font-size: 12px;
      padding: 0.4rem 0.6rem;
      background: #111;
      border: 1px solid #222;
      border-radius: 3px;
      color: #888;
      text-decoration: none;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .related-item:hover {
      background: #1a1a1a;
      border-color: #333;
      color: #aaa;
    }

    .tags {
      margin-bottom: 1rem;
    }

    .tags-label {
      font-size: 11px;
      color: #444;
      margin-bottom: 0.5rem;
    }

    .tags-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      background: #151515;
      border: 1px solid #252525;
      border-radius: 3px;
      cursor: pointer;
      color: #777;
    }

    .tag:hover {
      background: #1a1a1a;
      border-color: #333;
      color: #aaa;
    }

    .tag.active {
      background: rgba(27, 115, 64, 0.2);
      border-color: #1B7340;
      color: #2a9d5c;
    }

    .tag .count {
      color: #444;
      margin-left: 4px;
    }

    input.tag-input {
      /* match .tag styling exactly */
      font-size: 11px;
      padding: 3px 8px;
      background: #151515;
      border: 1px solid #252525;
      border-radius: 3px;
      color: #777;
      font-family: monospace;
      /* prevent flex expansion from global input[type="text"] */
      flex: none;
      width: 90px;
    }

    input.tag-input:hover {
      background: #1a1a1a;
      border-color: #333;
      color: #aaa;
    }

    input.tag-input:focus {
      outline: none;
      border-color: #1B7340;
      background: rgba(27, 115, 64, 0.1);
      color: #ccc;
    }

    input.tag-input::placeholder {
      color: #555;
    }

    .platform-filter {
      margin-bottom: 1rem;
    }

    .platform-filter-label {
      font-size: 11px;
      color: #444;
      margin-bottom: 0.5rem;
    }

    .platform-filter-list {
      display: flex;
      gap: 0.5rem;
    }

    .platform-option {
      font-size: 11px;
      padding: 3px 8px;
      background: #151515;
      border: 1px solid #252525;
      border-radius: 3px;
      cursor: pointer;
      color: #777;
    }

    .platform-option:hover {
      background: #1a1a1a;
      border-color: #333;
      color: #aaa;
    }

    .platform-option.active {
      background: rgba(180, 100, 64, 0.2);
      border-color: #d4956a;
      color: #d4956a;
    }


    .active-filter {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.5rem;
      background: rgba(27, 115, 64, 0.1);
      border: 1px solid #1B7340;
      border-radius: 4px;
      font-size: 12px;
    }

    .active-filter .clear {
      margin-left: auto;
      color: #666;
      cursor: pointer;
    }

    .active-filter .clear:hover {
      color: #c44;
    }

    .mode-toggle {
      margin-bottom: 1rem;
    }

    .mode-toggle-label {
      font-size: 11px;
      color: #444;
      margin-bottom: 0.5rem;
    }

    .mode-toggle-list {
      display: flex;
      gap: 0.5rem;
    }

    .mode-option {
      font-size: 11px;
      padding: 3px 8px;
      background: #151515;
      border: 1px solid #252525;
      border-radius: 3px;
      cursor: pointer;
      color: #777;
    }

    .mode-option:hover {
      background: #1a1a1a;
      border-color: #333;
      color: #aaa;
    }

    .mode-option.active {
      background: rgba(139, 92, 246, 0.2);
      border-color: #8b5cf6;
      color: #a78bfa;
    }

    .source-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 6px;
      text-transform: lowercase;
    }

    .source-badge.keyword {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }

    .source-badge.semantic {
      background: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
    }

    .source-badge.keyword-semantic {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
    }

    /* mobile improvements */
    @media (max-width: 600px) {
      body {
        padding: 0.75rem;
        font-size: 13px;
      }

      .container {
        max-width: 100%;
      }

      /* ensure minimum 44px touch targets */
      .tag, .platform-option, .mode-option, .suggestion, input.tag-input {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        padding: 0.5rem 0.75rem;
      }

      input.tag-input {
        width: 80px;
      }

      button {
        min-height: 44px;
        padding: 0.5rem 0.75rem;
      }

      /* stack search box on very small screens */
      .search-box {
        flex-direction: column;
        gap: 0.5rem;
      }

      .search-box input[type="text"] {
        width: 100%;
      }

      .search-box button {
        width: 100%;
      }

      /* result card mobile tweaks */
      .result {
        padding: 0.75rem 0;
      }

      .result:hover {
        margin: 0 -0.75rem;
        padding: 0.75rem;
      }

      .result-title {
        font-size: 14px;
        line-height: 1.4;
      }

      .result-snippet {
        font-size: 12px;
        line-height: 1.5;
      }

      /* badges inline on mobile */
      .entity-type, .platform-badge {
        font-size: 9px;
        padding: 2px 5px;
        margin-right: 6px;
        vertical-align: middle;
      }

      /* tags wrap better on mobile */
      .tags-list, .platform-filter-list {
        gap: 0.5rem;
      }

      /* suggestions responsive */
      .suggestions {
        line-height: 2;
      }

      /* related items more compact */
      .related-item {
        max-width: 150px;
        font-size: 11px;
        padding: 0.5rem;
      }
    }

    /* ensure touch targets on tablets too */
    @media (hover: none) and (pointer: coarse) {
      .tag, .platform-option, .mode-option, .suggestion, .related-item, input.tag-input {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><a href="/" class="title">pub search</a> <span class="by">by <a href="https://bsky.app/profile/zzstoatzz.io" target="_blank">@zzstoatzz.io</a></span> <a href="https://tangled.sh/@zzstoatzz.io/leaflet-search" target="_blank" class="src">[src]</a> <a id="header-stats" class="stats-link"></a></h1>

    <div class="search-box">
      <input type="text" id="query" placeholder="search content..." autofocus>
      <button id="search-btn">search</button>
    </div>

    <div id="mode-toggle" class="mode-toggle"></div>

    <div id="suggestions"></div>

    <div id="active-filter"></div>

    <div id="tags" class="tags"></div>

    <div id="platform-filter" class="platform-filter"></div>

    <div id="results" class="results">
      <div class="empty-state">
        <p>search atproto publishing platforms</p>
        <p style="font-size:11px;margin-top:0.5rem"><a href="https://leaflet.pub" target="_blank">leaflet</a> · <a href="https://pckt.blog" target="_blank">pckt</a> · <a href="https://offprint.app" target="_blank">offprint</a> · <a href="https://greengale.app" target="_blank">greengale</a> · <a href="https://standard.site" target="_blank">other</a></p>
      </div>
    </div>

    <div id="stats" class="stats"></div>
  </div>

  <script>
    const API_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? 'http://localhost:8080'
      : 'https://leaflet-search-backend.fly.dev';

    const queryInput = document.getElementById('query');
    const searchBtn = document.getElementById('search-btn');
    const resultsDiv = document.getElementById('results');
    const statsDiv = document.getElementById('stats');
    const tagsDiv = document.getElementById('tags');
    const activeFilterDiv = document.getElementById('active-filter');
    const suggestionsDiv = document.getElementById('suggestions');
    const platformFilterDiv = document.getElementById('platform-filter');
    const modeToggleDiv = document.getElementById('mode-toggle');
    let currentTag = null;
    let currentPlatform = null;
    let currentMode = 'keyword';
    let allTags = [];
    let popularSearches = [];
    const authorCache = new Map();
    let currentOffset = 0;
    let currentHasMore = false;
    const PAGE_SIZE = 20;

    // extract results array from API response (handles both v1 and v2 formats)
    function extractResults(parsed) {
      if (parsed.results && Array.isArray(parsed.results)) {
        return { results: parsed.results, total: parsed.total || parsed.results.length, hasMore: parsed.hasMore || false };
      }
      if (Array.isArray(parsed)) {
        return { results: parsed, total: parsed.length, hasMore: false };
      }
      return null;
    }

    async function search(query, tag = null, platform = null, append = false) {
      if (!query.trim() && !tag && !platform) return;

      if (!append) {
        searchBtn.disabled = true;
        resultsDiv.innerHTML = `<div class="status">searching...</div>`;
        currentOffset = 0;
      }

      let searchUrl = `${API_URL}/search?q=${encodeURIComponent(query || '')}&format=v2&limit=${PAGE_SIZE}&offset=${currentOffset}`;
      if (tag) searchUrl += `&tag=${encodeURIComponent(tag)}`;
      if (platform) searchUrl += `&platform=${encodeURIComponent(platform)}`;
      if (currentMode !== 'keyword') searchUrl += `&mode=${currentMode}`;

      try {
        const res = await fetch(searchUrl);
        const rawText = await res.text();
        let parsed;

        try {
          parsed = JSON.parse(rawText);
        } catch (parseErr) {
          resultsDiv.innerHTML = `<div class="status error">JSON parse error<pre style="text-align:left;font-size:0.7rem;overflow:auto;max-height:200px">${escapeHtml(rawText)}</pre></div>`;
          return;
        }

        if (parsed.error) {
          resultsDiv.innerHTML = `<div class="status error">${parsed.error}</div>`;
          return;
        }

        const extracted = extractResults(parsed);
        if (!extracted) {
          resultsDiv.innerHTML = `<div class="status error">unexpected response format</div>`;
          return;
        }

        const results = extracted.results;
        currentHasMore = extracted.hasMore;

        if (results.length === 0 && !append) {
          resultsDiv.innerHTML = `
            <div class="empty-state">
              <p>no results${query ? ` for ${formatQueryForDisplay(query)}` : ''}${tag ? ` in #${escapeHtml(tag)}` : ''}${platform ? ` on ${escapeHtml(platform)}` : ''}</p>
            </div>
          `;
          statsDiv.textContent = '';
          return;
        }

        let html = '';
        for (const doc of results) {
          const entityType = doc.type || 'article';
          const plat = doc.platform || 'leaflet';
          const docUrl = buildDocUrl(doc, entityType, plat);
          const platformConfig = PLATFORM_CONFIG[plat];
          const platformBadge = platformConfig
            ? `<span class="platform-badge">${escapeHtml(platformConfig.label)}</span>`
            : '';
          const date = doc.createdAt ? new Date(doc.createdAt).toLocaleDateString() : '';
          const platformHome = getPlatformHome(plat, doc.basePath);

          // source badge (only shown in hybrid/semantic modes)
          let sourceBadge = '';
          if (doc.source && currentMode !== 'keyword') {
            const cls = doc.source.replace('+', '-');
            sourceBadge = `<span class="source-badge ${cls}">${escapeHtml(doc.source)}</span>`;
          }

          // skip empty snippet divs (semantic results have no snippet)
          const snippetHtml = doc.snippet
            ? `<div class="result-snippet">${highlightTerms(doc.snippet, query)}</div>`
            : '';

          html += `
            <div class="result">
              <div class="result-title">
                <span class="entity-type ${entityType}">${entityType}</span>${platformBadge}
                ${docUrl
                  ? `<a href="${docUrl}" target="_blank">${escapeHtml(doc.title || 'Untitled')}</a>`
                  : escapeHtml(doc.title || 'Untitled')}${sourceBadge}
              </div>
              ${snippetHtml}
              <div class="result-meta" ${doc.did ? `data-did="${escapeHtml(doc.did)}"` : ''}>
                ${date ? `${date} | ` : ''}<span class="author-name"></span>${platformHome.url
                  ? `<a href="${platformHome.url}" target="_blank">${platformHome.label}</a>`
                  : platformHome.label}
              </div>
            </div>
          `;
        }

        if (append) {
          // remove existing "load more" button and related section before appending
          const existingLoadMore = resultsDiv.querySelector('.load-more');
          if (existingLoadMore) existingLoadMore.remove();
          const existingRelated = resultsDiv.querySelector('.related-section');
          if (existingRelated) existingRelated.remove();
          const existingRelatedLoading = resultsDiv.querySelector('.related-loading');
          if (existingRelatedLoading) existingRelatedLoading.remove();
          resultsDiv.insertAdjacentHTML('beforeend', html);
        } else {
          resultsDiv.innerHTML = html;
        }

        const totalShown = resultsDiv.querySelectorAll('.result').length;
        statsDiv.textContent = `${totalShown} result${totalShown === 1 ? '' : 's'}${extracted.total > totalShown ? ` of ${extracted.total}` : ''}`;
        resolveAuthors(results);

        // add "load more" button if there are more results
        if (currentHasMore) {
          const remaining = extracted.total - totalShown;
          const remainingText = remaining > 0 ? ` (${remaining} remaining)` : '';
          const loadMoreHtml = `<div class="load-more" style="text-align:center;padding:1rem"><button onclick="loadMore()" style="font-size:12px">load more${remainingText}</button></div>`;
          resultsDiv.insertAdjacentHTML('beforeend', loadMoreHtml);
        }

        if (!append && results.length > 0 && results[0].uri) {
          loadRelated(results[0]);
        }

      } catch (err) {
        resultsDiv.innerHTML = `<div class="status error">error: ${err.message}</div>`;
      } finally {
        searchBtn.disabled = false;
      }
    }

    function loadMore() {
      currentOffset += PAGE_SIZE;
      search(queryInput.value, currentTag, currentPlatform, true);
    }

    async function resolveAuthors(results) {
      // collect unique DIDs, skip publications
      const dids = [...new Set(
        results
          .filter(r => r.did && (r.type || 'article') !== 'publication')
          .map(r => r.did)
      )];

      // find which DIDs we still need to fetch
      const toFetch = dids.filter(d => !authorCache.has(d));

      if (toFetch.length > 0) {
        try {
          // batch up to 25 per request
          for (let i = 0; i < toFetch.length; i += 25) {
            const batch = toFetch.slice(i, i + 25);
            const params = batch.map(d => `actors=${encodeURIComponent(d)}`).join('&');
            const res = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfiles?${params}`);
            if (res.ok) {
              const data = await res.json();
              for (const profile of data.profiles) {
                authorCache.set(profile.did, profile.handle);
              }
            }
          }
        } catch (e) {
          // graceful degradation — results already visible without names
        }
      }

      // populate DOM
      document.querySelectorAll('.result-meta[data-did]').forEach(el => {
        const did = el.dataset.did;
        const handle = authorCache.get(did);
        if (!handle) return;
        const nameSpan = el.querySelector('.author-name');
        if (!nameSpan || nameSpan.innerHTML) return; // already populated
        nameSpan.innerHTML = `<a href="https://bsky.app/profile/${escapeHtml(did)}" target="_blank">@${escapeHtml(handle)}</a> · `;
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    // display query without adding redundant quotes
    function formatQueryForDisplay(query) {
      if (!query) return '';
      const escaped = escapeHtml(query);
      // if query is already fully quoted, don't add more quotes
      if (query.startsWith('"') && query.endsWith('"')) {
        return escaped;
      }
      return `"${escaped}"`;
    }

    // platform-specific URL patterns
    // note: some platforms use basePath from publication, which we prefer
    // fallback docUrl() is used when basePath is missing
    const PLATFORM_CONFIG = {
      leaflet: {
        home: 'https://leaflet.pub',
        label: 'leaflet.pub',
        // leaflet uses did/rkey pattern for fallback URLs
        docUrl: (did, rkey) => `https://leaflet.pub/p/${did}/${rkey}`
      },
      pckt: {
        home: 'https://pckt.blog',
        label: 'pckt.blog',
        // pckt uses blog slugs + path, not did/rkey - needs basePath from publication
        docUrl: null
      },
      offprint: {
        home: 'https://offprint.app',
        label: 'offprint.app',
        // offprint is in early beta, URL pattern unknown
        docUrl: null
      },
      greengale: {
        home: 'https://greengale.app',
        label: 'greengale.app',
        // greengale uses basePath + path pattern
        docUrl: null
      },
      whitewind: {
        home: 'https://whtwnd.com',
        label: 'whtwnd.com',
        docUrl: (did, rkey) => `https://whtwnd.com/${did}/${rkey}`
      },
      other: {
        home: 'https://standard.site',
        label: 'other',
        // "other" = site.standard.* documents not from a known platform
        docUrl: null
      },
    };

    function buildDocUrl(doc, entityType, platform) {
      if (entityType === 'publication') {
        return doc.basePath ? `https://${doc.basePath}` : null;
      }

      // Platform-specific URL patterns:
      // 1. Leaflet: basePath + rkey (e.g., https://dad.leaflet.pub/3mburumcnbs2m)
      if (platform === 'leaflet' && doc.basePath && doc.rkey) {
        return `https://${doc.basePath}/${doc.rkey}`;
      }

      // 2. pckt: basePath + path (e.g., https://devlog.pckt.blog/some-slug-abc123)
      if (platform === 'pckt' && doc.basePath && doc.path) {
        const separator = doc.path.startsWith('/') ? '' : '/';
        return `https://${doc.basePath}${separator}${doc.path}`;
      }

      // 3. Other platforms with path: basePath + path
      if (doc.basePath && doc.path) {
        const separator = doc.path.startsWith('/') ? '' : '/';
        return `https://${doc.basePath}${separator}${doc.path}`;
      }

      // 4. Platform-specific fallback URL (e.g., leaflet.pub/p/did/rkey)
      const config = PLATFORM_CONFIG[platform];
      if (config?.docUrl && doc.did && doc.rkey) {
        return config.docUrl(doc.did, doc.rkey);
      }

      // 5. Fallback: pdsls.dev universal viewer (always works for any AT Protocol record)
      if (doc.uri) {
        return `https://pdsls.dev/${doc.uri}`;
      }

      return null;
    }

    function getPlatformHome(platform, basePath) {
      if (basePath) {
        return { url: `https://${basePath}`, label: basePath };
      }
      const config = PLATFORM_CONFIG[platform];
      if (config) {
        return { url: config.home, label: config.label };
      }
      // fallback for documents without a known platform - link to standard.site lexicon
      return { url: 'https://standard.site', label: 'other' };
    }

    function highlightTerms(text, query) {
      if (!text || !query) return escapeHtml(text);

      // extract terms: quoted phrases as single terms, or split by whitespace
      const terms = [];
      const phraseRegex = /"([^"]+)"/g;
      let match;
      let remaining = query.toLowerCase();

      // extract quoted phrases first
      while ((match = phraseRegex.exec(query.toLowerCase())) !== null) {
        terms.push(match[1]); // the phrase without quotes
        remaining = remaining.replace(match[0], ' ');
      }

      // add remaining non-quoted terms
      remaining.split(/\s+/).filter(t => t.length > 0).forEach(t => terms.push(t));

      if (terms.length === 0) return escapeHtml(text);

      // build regex that matches any term (case insensitive)
      const escaped = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
      const regex = new RegExp(`(${escaped.join('|')})`, 'gi');

      // escape HTML first, then apply highlights
      return escapeHtml(text).replace(regex, '<mark>$1</mark>');
    }

    function updateUrl() {
      const params = new URLSearchParams();
      const q = queryInput.value.trim();
      if (q) params.set('q', q);
      if (currentTag) params.set('tag', currentTag);
      if (currentPlatform) params.set('platform', currentPlatform);
      if (currentMode !== 'keyword') params.set('mode', currentMode);
      const url = params.toString() ? `?${params}` : '/';
      history.pushState(null, '', url);
    }

    function doSearch() {
      updateUrl();
      search(queryInput.value, currentTag, currentPlatform);
    }

    function setTag(tag) {
      if (currentTag === tag) {
        clearTag();
        return;
      }
      currentTag = tag;
      renderActiveFilter();
      renderTags();
      doSearch();
    }

    function clearTag() {
      currentTag = null;
      renderActiveFilter();
      renderTags();
      updateUrl();
      if (queryInput.value.trim() || currentPlatform) {
        search(queryInput.value, null, currentPlatform);
      } else {
        renderEmptyState();
      }
    }

    function setPlatform(platform) {
      if (currentPlatform === platform) {
        clearPlatform();
        return;
      }
      currentPlatform = platform;
      renderActiveFilter();
      renderPlatformFilter();
      doSearch();
    }

    function clearPlatform() {
      currentPlatform = null;
      renderActiveFilter();
      renderPlatformFilter();
      updateUrl();
      if (queryInput.value.trim() || currentTag) {
        search(queryInput.value, currentTag, null);
      } else {
        renderEmptyState();
      }
    }

    function renderPlatformFilter() {
      const platforms = [
        { id: 'leaflet', label: 'leaflet' },
        { id: 'pckt', label: 'pckt' },
        { id: 'offprint', label: 'offprint' },
        { id: 'greengale', label: 'greengale' },
        { id: 'whitewind', label: 'whitewind' },
        { id: 'other', label: 'other' },
      ];
      const html = platforms.map(p => `
        <span class="platform-option${currentPlatform === p.id ? ' active' : ''}" onclick="setPlatform('${p.id}')">${p.label}</span>
      `).join('');
      platformFilterDiv.innerHTML = `<div class="platform-filter-label">filter by platform:</div><div class="platform-filter-list">${html}</div>`;
    }

    function renderModeToggle() {
      const modes = [
        { id: 'keyword', label: 'keyword' },
        { id: 'semantic', label: 'semantic' },
        { id: 'hybrid', label: 'hybrid' },
      ];
      const html = modes.map(m => `
        <span class="mode-option${currentMode === m.id ? ' active' : ''}" onclick="setMode('${m.id}')">${m.label}</span>
      `).join('');
      modeToggleDiv.innerHTML = `<div class="mode-toggle-label">search mode:</div><div class="mode-toggle-list">${html}</div>`;
    }

    function setMode(mode) {
      if (currentMode === mode) return;
      currentMode = mode;
      renderModeToggle();
      // hide tags/since for non-keyword modes (tpuf doesn't support them)
      tagsDiv.style.display = currentMode === 'keyword' ? '' : 'none';
      if (currentMode !== 'keyword') {
        currentTag = null;
        renderActiveFilter();
      }
      // trigger search if there's a query
      if (queryInput.value.trim() || currentTag || currentPlatform) {
        doSearch();
      }
    }

    function renderActiveFilter() {
      if (!currentTag && !currentPlatform) {
        activeFilterDiv.innerHTML = '';
        return;
      }
      let parts = [];
      if (currentTag) parts.push(`tag: <strong>#${escapeHtml(currentTag)}</strong>`);
      if (currentPlatform) parts.push(`platform: <strong>${escapeHtml(currentPlatform)}</strong>`);
      const clearActions = [];
      if (currentTag) clearActions.push(`<span class="clear" onclick="clearTag()">× tag</span>`);
      if (currentPlatform) clearActions.push(`<span class="clear" onclick="clearPlatform()">× platform</span>`);
      activeFilterDiv.innerHTML = `
        <div class="active-filter">
          <span>filtering by ${parts.join(', ')} <span style="color:#666;font-size:10px">(documents only)</span></span>
          ${clearActions.join(' ')}
        </div>
      `;
    }

    function renderTags() {
      const tagsHtml = allTags.slice(0, 15).map(t => `
        <span class="tag${currentTag === t.tag ? ' active' : ''}" onclick="setTag('${escapeHtml(t.tag)}')">${escapeHtml(t.tag)}<span class="count">${t.count}</span></span>
      `).join('');
      const inputHtml = `<input type="text" class="tag-input" id="tag-input" placeholder="enter tag..." value="${currentTag && !allTags.some(t => t.tag === currentTag) ? escapeHtml(currentTag) : ''}">`;
      tagsDiv.innerHTML = `<div class="tags-label">filter by tag:</div><div class="tags-list">${tagsHtml}${inputHtml}</div>`;

      // bind enter key handler
      const tagInput = document.getElementById('tag-input');
      tagInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const val = tagInput.value.trim();
          if (val) {
            setTag(val);
          }
        }
      });
    }

    async function loadTags() {
      try {
        const res = await fetch(`${API_URL}/tags?format=v2`);
        const data = await res.json();
        if (data.error) {
          console.error('failed to load tags:', data.error);
          return;
        }
        const extracted = extractResults(data);
        allTags = extracted ? extracted.results : (Array.isArray(data) ? data : []);
        renderTags();
      } catch (e) {
        console.error('failed to load tags', e);
      }
    }

    async function loadPopular() {
      try {
        const res = await fetch(`${API_URL}/popular?format=v2`);
        const data = await res.json();
        if (!data.error) {
          const extracted = extractResults(data);
          const items = extracted ? extracted.results : (Array.isArray(data) ? data : []);
          popularSearches = items.slice(0, 5);
          renderSuggestions();
        }
      } catch (e) {
        console.error('failed to load popular', e);
      }
    }

    function renderSuggestions() {
      if (popularSearches.length === 0) {
        suggestionsDiv.innerHTML = '';
        return;
      }
      suggestionsDiv.innerHTML = `
        <div class="suggestions">
          <span class="suggestions-label">popular searches:</span>
          <span class="suggestions-list">
            ${popularSearches.map(p => `<span class="suggestion" onclick="searchPopular('${escapeHtml(p.query)}')">${escapeHtml(p.query)}</span>`).join('')}
          </span>
        </div>
      `;
    }

    function renderEmptyState() {
      resultsDiv.innerHTML = `
        <div class="empty-state">
          <p>search atproto publishing platforms</p>
          <p style="font-size:11px;margin-top:0.5rem"><a href="https://leaflet.pub" target="_blank">leaflet</a> · <a href="https://pckt.blog" target="_blank">pckt</a> · <a href="https://offprint.app" target="_blank">offprint</a> · <a href="https://greengale.app" target="_blank">greengale</a> · <a href="https://standard.site" target="_blank">other</a></p>
        </div>
      `;
    }

    function searchPopular(query) {
      queryInput.value = query;
      doSearch();
    }

    searchBtn.addEventListener('click', doSearch);
    queryInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    window.addEventListener('popstate', () => {
      const params = new URLSearchParams(location.search);
      queryInput.value = params.get('q') || '';
      currentTag = params.get('tag') || null;
      currentPlatform = params.get('platform') || null;
      currentMode = params.get('mode') || 'keyword';
      renderActiveFilter();
      renderTags();
      renderPlatformFilter();
      renderModeToggle();
      tagsDiv.style.display = currentMode === 'keyword' ? '' : 'none';
      if (queryInput.value || currentTag || currentPlatform) search(queryInput.value, currentTag, currentPlatform);
    });

    // init
    const initialParams = new URLSearchParams(location.search);
    const initialQuery = initialParams.get('q');
    const initialTag = initialParams.get('tag');
    const initialPlatform = initialParams.get('platform');
    const initialMode = initialParams.get('mode');
    if (initialQuery) queryInput.value = initialQuery;
    if (initialTag) currentTag = initialTag;
    if (initialPlatform) currentPlatform = initialPlatform;
    if (initialMode) currentMode = initialMode;
    renderActiveFilter();
    renderPlatformFilter();
    renderModeToggle();
    tagsDiv.style.display = currentMode === 'keyword' ? '' : 'none';

    if (initialQuery || initialTag || initialPlatform) {
      search(initialQuery || '', initialTag, initialPlatform);
    }

    async function loadRelated(topResult) {
      // show loading state
      const loadingEl = document.createElement('div');
      loadingEl.className = 'related-loading';
      loadingEl.textContent = 'finding related...';
      resultsDiv.appendChild(loadingEl);

      try {
        const res = await fetch(`${API_URL}/similar?uri=${encodeURIComponent(topResult.uri)}&format=v2`);
        const data = await res.json();

        loadingEl.remove();

        const extracted = extractResults(data);
        const related = extracted ? extracted.results : (Array.isArray(data) ? data : []);

        if (!related || related.length === 0) return;

        // filter out the top result itself and limit to 4
        const filtered = related
          .filter(r => r.uri !== topResult.uri)
          .slice(0, 4);

        if (filtered.length === 0) return;

        const items = filtered.map(doc => {
          const platform = doc.platform || 'leaflet';
          const url = buildDocUrl(doc, doc.type || 'article', platform);
          return url
            ? `<a href="${url}" target="_blank" class="related-item">${escapeHtml(doc.title || 'Untitled')}</a>`
            : `<span class="related-item">${escapeHtml(doc.title || 'Untitled')}</span>`;
        }).join('');

        const relatedHtml = `
          <div class="related-section">
            <div class="related-header">related to "${escapeHtml(topResult.title?.slice(0, 30) || 'top result')}${topResult.title?.length > 30 ? '...' : ''}"</div>
            <div class="related-items">${items}</div>
          </div>
        `;

        resultsDiv.insertAdjacentHTML('beforeend', relatedHtml);
      } catch (e) {
        loadingEl.remove();
      }
    }

    loadTags();
    loadPopular();

    fetch(`${API_URL}/stats`)
      .then(r => r.json())
      .then(data => {
        statsDiv.innerHTML = `${data.documents} documents, ${data.publications} publications · <a href="${API_URL}/dashboard" target="_blank">stats</a>`;
        const headerStats = document.getElementById('header-stats');
        headerStats.href = `${API_URL}/dashboard`;
        headerStats.target = '_blank';
        headerStats.textContent = `[${data.documents.toLocaleString()} docs]`;
      })
      .catch(() => {
        statsDiv.textContent = 'connecting...';
      });
  </script>
</body>
</html>
