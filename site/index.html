<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>pub search</title>
  <meta name="description" content="search atproto publishing platforms">
  <meta property="og:title" content="pub search">
  <meta property="og:description" content="search atproto publishing platforms">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="pub search">
  <meta name="twitter:description" content="search atproto publishing platforms">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0a0a0a;
      color: #ccc;
      min-height: 100vh;
      padding: 1rem;
      font-size: 14px;
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    a { color: #1B7340; text-decoration: none; }
    a:hover { color: #2a9d5c; }

    h1 {
      font-size: 12px;
      font-weight: normal;
      margin-bottom: 1.5rem;
    }

    h1 a.title {
      color: #888;
    }

    h1 a.title:hover {
      color: #fff;
    }

    h1 a.src {
      font-size: 10px;
      color: #444;
    }

    h1 .by {
      font-size: 10px;
      color: #555;
    }

    h1 .by a {
      color: #555;
    }

    h1 .by a:hover {
      color: #1B7340;
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.5rem;
      font-family: monospace;
      font-size: 16px; /* prevents iOS auto-zoom on focus */
      background: #111;
      border: 1px solid #333;
      color: #ccc;
    }

    input[type="text"]:focus { outline: 1px solid #1B7340; }

    button {
      padding: 0.5rem 1rem;
      font-family: monospace;
      font-size: 14px;
      background: #111;
      border: 1px solid #333;
      color: #ccc;
      cursor: pointer;
    }

    button:hover { background: #222; }
    button:disabled { color: #555; cursor: not-allowed; }

    .results {
      display: flex;
      flex-direction: column;
    }

    .result {
      border-bottom: 1px solid #222;
      padding: 1rem 0;
    }

    .result:hover { background: #111; margin: 0 -0.5rem; padding: 1rem 0.5rem; }

    .result-title {
      color: #fff;
      margin-bottom: 0.5rem;
      /* prevent long titles from breaking layout */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    .result-title a { color: inherit; }
    .result-title a:hover { color: #2a9d5c; }

    .result-snippet {
      font-size: 12px;
      color: #888;
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .result-snippet mark {
      background: rgba(27, 115, 64, 0.3);
      color: #2a9d5c;
      padding: 0 2px;
    }

    .result-meta {
      font-size: 11px;
      color: #555;
    }

    .entity-type {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-right: 8px;
      text-transform: lowercase;
    }

    .entity-type.article {
      background: rgba(27, 115, 64, 0.2);
      color: #2a9d5c;
    }

    .entity-type.looseleaf {
      background: rgba(100, 100, 100, 0.2);
      color: #888;
    }

    .entity-type.publication {
      background: rgba(64, 115, 180, 0.2);
      color: #6a9fd4;
    }

    .platform-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-right: 8px;
      text-transform: lowercase;
      background: rgba(180, 100, 64, 0.2);
      color: #d4956a;
    }

    .status {
      padding: 1rem;
      text-align: center;
      color: #666;
    }

    .error { color: #c44; }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #555;
    }

    .empty-state p { margin-bottom: 0.5rem; }

    .suggestions {
      font-size: 11px;
      color: #444;
      margin-bottom: 1.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .suggestions-label {
      color: #555;
      margin-right: 0.25rem;
    }

    .suggestions-list {
      display: inline;
    }

    .suggestion {
      color: #666;
      cursor: pointer;
      font-style: italic;
    }

    .suggestion::before {
      content: '"';
      color: #444;
    }

    .suggestion::after {
      content: '"';
      color: #444;
      margin-right: 0.5rem;
    }

    .suggestion:hover {
      color: #2a9d5c;
    }

    .suggestion:hover::before,
    .suggestion:hover::after {
      color: #2a9d5c;
    }

    .stats {
      font-size: 11px;
      color: #555;
      margin-top: 1.5rem;
      text-align: center;
    }

    .related-section {
      margin-top: 1rem;
      padding-top: 0;
    }

    .related-header {
      font-size: 11px;
      color: #444;
      margin-bottom: 0.75rem;
    }

    .related-loading {
      font-size: 11px;
      color: #666;
      margin-top: 1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    .related-items {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .related-item {
      font-size: 12px;
      padding: 0.4rem 0.6rem;
      background: #111;
      border: 1px solid #222;
      border-radius: 3px;
      color: #888;
      text-decoration: none;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .related-item:hover {
      background: #1a1a1a;
      border-color: #333;
      color: #aaa;
    }

    .tags {
      margin-bottom: 1rem;
    }

    .tags-label {
      font-size: 11px;
      color: #444;
      margin-bottom: 0.5rem;
    }

    .tags-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      background: #151515;
      border: 1px solid #252525;
      border-radius: 3px;
      cursor: pointer;
      color: #777;
    }

    .tag:hover {
      background: #1a1a1a;
      border-color: #333;
      color: #aaa;
    }

    .tag.active {
      background: rgba(27, 115, 64, 0.2);
      border-color: #1B7340;
      color: #2a9d5c;
    }

    .tag .count {
      color: #444;
      margin-left: 4px;
    }

    .platform-filter {
      margin-bottom: 1rem;
    }

    .platform-filter-label {
      font-size: 11px;
      color: #444;
      margin-bottom: 0.5rem;
    }

    .platform-filter-list {
      display: flex;
      gap: 0.5rem;
    }

    .platform-option {
      font-size: 11px;
      padding: 3px 8px;
      background: #151515;
      border: 1px solid #252525;
      border-radius: 3px;
      cursor: pointer;
      color: #777;
    }

    .platform-option:hover {
      background: #1a1a1a;
      border-color: #333;
      color: #aaa;
    }

    .platform-option.active {
      background: rgba(180, 100, 64, 0.2);
      border-color: #d4956a;
      color: #d4956a;
    }

    .active-filter {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.5rem;
      background: rgba(27, 115, 64, 0.1);
      border: 1px solid #1B7340;
      border-radius: 4px;
      font-size: 12px;
    }

    .active-filter .clear {
      margin-left: auto;
      color: #666;
      cursor: pointer;
    }

    .active-filter .clear:hover {
      color: #c44;
    }

    /* mobile improvements */
    @media (max-width: 600px) {
      body {
        padding: 0.75rem;
        font-size: 13px;
      }

      .container {
        max-width: 100%;
      }

      /* ensure minimum 44px touch targets */
      .tag, .platform-option, .suggestion {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        padding: 0.5rem 0.75rem;
      }

      button {
        min-height: 44px;
        padding: 0.5rem 0.75rem;
      }

      /* stack search box on very small screens */
      .search-box {
        flex-direction: column;
        gap: 0.5rem;
      }

      .search-box input[type="text"] {
        width: 100%;
      }

      .search-box button {
        width: 100%;
      }

      /* result card mobile tweaks */
      .result {
        padding: 0.75rem 0;
      }

      .result:hover {
        margin: 0 -0.75rem;
        padding: 0.75rem;
      }

      .result-title {
        font-size: 14px;
        line-height: 1.4;
      }

      .result-snippet {
        font-size: 12px;
        line-height: 1.5;
      }

      /* badges inline on mobile */
      .entity-type, .platform-badge {
        font-size: 9px;
        padding: 2px 5px;
        margin-right: 6px;
        vertical-align: middle;
      }

      /* tags wrap better on mobile */
      .tags-list, .platform-filter-list {
        gap: 0.5rem;
      }

      /* suggestions responsive */
      .suggestions {
        line-height: 2;
      }

      /* related items more compact */
      .related-item {
        max-width: 150px;
        font-size: 11px;
        padding: 0.5rem;
      }
    }

    /* ensure touch targets on tablets too */
    @media (hover: none) and (pointer: coarse) {
      .tag, .platform-option, .suggestion, .related-item {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><a href="/" class="title">pub search</a> <span class="by">by <a href="https://bsky.app/profile/zzstoatzz.io" target="_blank">@zzstoatzz.io</a></span> <a href="https://tangled.sh/@zzstoatzz.io/leaflet-search" target="_blank" class="src">[src]</a></h1>

    <div class="search-box">
      <input type="text" id="query" placeholder="search content..." autofocus>
      <button id="search-btn">search</button>
    </div>

    <div id="suggestions"></div>

    <div id="active-filter"></div>

    <div id="tags" class="tags"></div>

    <div id="platform-filter" class="platform-filter"></div>

    <div id="results" class="results">
      <div class="empty-state">
        <p>search atproto publishing platforms</p>
        <p style="font-size:11px;margin-top:0.5rem"><a href="https://leaflet.pub" target="_blank">leaflet</a> · <a href="https://pckt.blog" target="_blank">pckt</a> · <a href="https://offprint.app" target="_blank">offprint</a> · <a href="https://greengale.app" target="_blank">greengale</a> · <a href="https://standard.site" target="_blank">other</a></p>
      </div>
    </div>

    <div id="stats" class="stats"></div>
  </div>

  <script>
    const API_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? 'http://localhost:8080'
      : 'https://leaflet-search-backend.fly.dev';

    const queryInput = document.getElementById('query');
    const searchBtn = document.getElementById('search-btn');
    const resultsDiv = document.getElementById('results');
    const statsDiv = document.getElementById('stats');
    const tagsDiv = document.getElementById('tags');
    const activeFilterDiv = document.getElementById('active-filter');
    const suggestionsDiv = document.getElementById('suggestions');
    const platformFilterDiv = document.getElementById('platform-filter');

    let currentTag = null;
    let currentPlatform = null;
    let allTags = [];
    let popularSearches = [];

    async function search(query, tag = null, platform = null) {
      if (!query.trim() && !tag && !platform) return;

      searchBtn.disabled = true;
      let searchUrl = `${API_URL}/search?q=${encodeURIComponent(query || '')}`;
      if (tag) searchUrl += `&tag=${encodeURIComponent(tag)}`;
      if (platform) searchUrl += `&platform=${encodeURIComponent(platform)}`;
      resultsDiv.innerHTML = `<div class="status">searching...</div>`;

      try {
        const res = await fetch(searchUrl);
        const rawText = await res.text();
        let results;

        try {
          results = JSON.parse(rawText);
        } catch (parseErr) {
          resultsDiv.innerHTML = `<div class="status error">JSON parse error<pre style="text-align:left;font-size:0.7rem;overflow:auto;max-height:200px">${escapeHtml(rawText)}</pre></div>`;
          return;
        }

        if (results.error) {
          resultsDiv.innerHTML = `<div class="status error">${results.error}</div>`;
          return;
        }

        if (results.length === 0) {
          resultsDiv.innerHTML = `
            <div class="empty-state">
              <p>no results${query ? ` for ${formatQueryForDisplay(query)}` : ''}${tag ? ` in #${escapeHtml(tag)}` : ''}${platform ? ` on ${escapeHtml(platform)}` : ''}</p>
              <p>try different keywords</p>
            </div>
          `;
          statsDiv.textContent = '';
          return;
        }

        let html = '';

        for (const doc of results) {
          const entityType = doc.type || 'article';
          const platform = doc.platform || 'leaflet';

          // build URL based on entity type and platform
          const docUrl = buildDocUrl(doc, entityType, platform);
          // only show platform badge for actual platforms, not for lexicon-only records
          const platformConfig = PLATFORM_CONFIG[platform];
          const platformBadge = platformConfig
            ? `<span class="platform-badge">${escapeHtml(platformConfig.label)}</span>`
            : '';
          const date = doc.createdAt ? new Date(doc.createdAt).toLocaleDateString() : '';

          // platform home URL for meta link
          const platformHome = getPlatformHome(platform, doc.basePath);

          html += `
            <div class="result">
              <div class="result-title">
                <span class="entity-type ${entityType}">${entityType}</span>${platformBadge}
                ${docUrl
                  ? `<a href="${docUrl}" target="_blank">${escapeHtml(doc.title || 'Untitled')}</a>`
                  : escapeHtml(doc.title || 'Untitled')}
              </div>
              <div class="result-snippet">${highlightTerms(doc.snippet, query)}</div>
              <div class="result-meta">
                ${date ? `${date} | ` : ''}${platformHome.url
                  ? `<a href="${platformHome.url}" target="_blank">${platformHome.label}</a>`
                  : platformHome.label}
              </div>
            </div>
          `;
        }

        resultsDiv.innerHTML = html;
        statsDiv.textContent = `${results.length} result${results.length === 1 ? '' : 's'}`;

        // load related documents based on top result
        if (results.length > 0 && results[0].uri) {
          loadRelated(results[0]);
        }

      } catch (err) {
        resultsDiv.innerHTML = `<div class="status error">error: ${err.message}<br><code style="font-size:0.7rem">${searchUrl}</code></div>`;
      } finally {
        searchBtn.disabled = false;
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    // display query without adding redundant quotes
    function formatQueryForDisplay(query) {
      if (!query) return '';
      const escaped = escapeHtml(query);
      // if query is already fully quoted, don't add more quotes
      if (query.startsWith('"') && query.endsWith('"')) {
        return escaped;
      }
      return `"${escaped}"`;
    }

    // platform-specific URL patterns
    // note: some platforms use basePath from publication, which we prefer
    // fallback docUrl() is used when basePath is missing
    const PLATFORM_CONFIG = {
      leaflet: {
        home: 'https://leaflet.pub',
        label: 'leaflet.pub',
        // leaflet uses did/rkey pattern for fallback URLs
        docUrl: (did, rkey) => `https://leaflet.pub/p/${did}/${rkey}`
      },
      pckt: {
        home: 'https://pckt.blog',
        label: 'pckt.blog',
        // pckt uses blog slugs + path, not did/rkey - needs basePath from publication
        docUrl: null
      },
      offprint: {
        home: 'https://offprint.app',
        label: 'offprint.app',
        // offprint is in early beta, URL pattern unknown
        docUrl: null
      },
      greengale: {
        home: 'https://greengale.app',
        label: 'greengale.app',
        // greengale uses basePath + path pattern
        docUrl: null
      },
      other: {
        home: 'https://standard.site',
        label: 'other',
        // "other" = site.standard.* documents not from a known platform
        docUrl: null
      },
    };

    function buildDocUrl(doc, entityType, platform) {
      if (entityType === 'publication') {
        return doc.basePath ? `https://${doc.basePath}` : null;
      }

      // Platform-specific URL patterns:
      // 1. Leaflet: basePath + rkey (e.g., https://dad.leaflet.pub/3mburumcnbs2m)
      if (platform === 'leaflet' && doc.basePath && doc.rkey) {
        return `https://${doc.basePath}/${doc.rkey}`;
      }

      // 2. pckt: basePath + path (e.g., https://devlog.pckt.blog/some-slug-abc123)
      if (platform === 'pckt' && doc.basePath && doc.path) {
        const separator = doc.path.startsWith('/') ? '' : '/';
        return `https://${doc.basePath}${separator}${doc.path}`;
      }

      // 3. Other platforms with path: basePath + path
      if (doc.basePath && doc.path) {
        const separator = doc.path.startsWith('/') ? '' : '/';
        return `https://${doc.basePath}${separator}${doc.path}`;
      }

      // 4. Platform-specific fallback URL (e.g., leaflet.pub/p/did/rkey)
      const config = PLATFORM_CONFIG[platform];
      if (config?.docUrl && doc.did && doc.rkey) {
        return config.docUrl(doc.did, doc.rkey);
      }

      // 5. Fallback: pdsls.dev universal viewer (always works for any AT Protocol record)
      if (doc.uri) {
        return `https://pdsls.dev/${doc.uri}`;
      }

      return null;
    }

    function getPlatformHome(platform, basePath) {
      if (basePath) {
        return { url: `https://${basePath}`, label: basePath };
      }
      const config = PLATFORM_CONFIG[platform];
      if (config) {
        return { url: config.home, label: config.label };
      }
      // fallback for documents without a known platform - link to standard.site lexicon
      return { url: 'https://standard.site', label: 'other' };
    }

    function highlightTerms(text, query) {
      if (!text || !query) return escapeHtml(text);
      const terms = query.toLowerCase().split(/\s+/).filter(t => t.length > 0);
      if (terms.length === 0) return escapeHtml(text);

      // build regex that matches any term (case insensitive)
      const escaped = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
      const regex = new RegExp(`(${escaped.join('|')})`, 'gi');

      // escape HTML first, then apply highlights
      return escapeHtml(text).replace(regex, '<mark>$1</mark>');
    }

    function updateUrl() {
      const params = new URLSearchParams();
      const q = queryInput.value.trim();
      if (q) params.set('q', q);
      if (currentTag) params.set('tag', currentTag);
      if (currentPlatform) params.set('platform', currentPlatform);
      const url = params.toString() ? `?${params}` : '/';
      history.pushState(null, '', url);
    }

    function doSearch() {
      updateUrl();
      search(queryInput.value, currentTag, currentPlatform);
    }

    function setTag(tag) {
      if (currentTag === tag) {
        clearTag();
        return;
      }
      currentTag = tag;
      renderActiveFilter();
      renderTags();
      doSearch();
    }

    function clearTag() {
      currentTag = null;
      renderActiveFilter();
      renderTags();
      updateUrl();
      if (queryInput.value.trim() || currentPlatform) {
        search(queryInput.value, null, currentPlatform);
      } else {
        renderEmptyState();
      }
    }

    function setPlatform(platform) {
      if (currentPlatform === platform) {
        clearPlatform();
        return;
      }
      currentPlatform = platform;
      renderActiveFilter();
      renderPlatformFilter();
      doSearch();
    }

    function clearPlatform() {
      currentPlatform = null;
      renderActiveFilter();
      renderPlatformFilter();
      updateUrl();
      if (queryInput.value.trim() || currentTag) {
        search(queryInput.value, currentTag, null);
      } else {
        renderEmptyState();
      }
    }

    function renderPlatformFilter() {
      const platforms = [
        { id: 'leaflet', label: 'leaflet' },
        { id: 'pckt', label: 'pckt' },
        { id: 'offprint', label: 'offprint' },
        { id: 'greengale', label: 'greengale' },
        { id: 'other', label: 'other' },
      ];
      const html = platforms.map(p => `
        <span class="platform-option${currentPlatform === p.id ? ' active' : ''}" onclick="setPlatform('${p.id}')">${p.label}</span>
      `).join('');
      platformFilterDiv.innerHTML = `<div class="platform-filter-label">filter by platform:</div><div class="platform-filter-list">${html}</div>`;
    }

    function renderActiveFilter() {
      if (!currentTag && !currentPlatform) {
        activeFilterDiv.innerHTML = '';
        return;
      }
      let parts = [];
      if (currentTag) parts.push(`tag: <strong>#${escapeHtml(currentTag)}</strong>`);
      if (currentPlatform) parts.push(`platform: <strong>${escapeHtml(currentPlatform)}</strong>`);
      const clearActions = [];
      if (currentTag) clearActions.push(`<span class="clear" onclick="clearTag()">× tag</span>`);
      if (currentPlatform) clearActions.push(`<span class="clear" onclick="clearPlatform()">× platform</span>`);
      activeFilterDiv.innerHTML = `
        <div class="active-filter">
          <span>filtering by ${parts.join(', ')} <span style="color:#666;font-size:10px">(documents only)</span></span>
          ${clearActions.join(' ')}
        </div>
      `;
    }

    function renderTags() {
      if (allTags.length === 0) {
        tagsDiv.innerHTML = '';
        return;
      }
      const html = allTags.slice(0, 15).map(t => `
        <span class="tag${currentTag === t.tag ? ' active' : ''}" onclick="setTag('${escapeHtml(t.tag)}')">${escapeHtml(t.tag)}<span class="count">${t.count}</span></span>
      `).join('');
      tagsDiv.innerHTML = `<div class="tags-label">filter by tag:</div><div class="tags-list">${html}</div>`;
    }

    async function loadTags() {
      try {
        const res = await fetch(`${API_URL}/tags`);
        const data = await res.json();
        if (data.error) {
          console.error('failed to load tags:', data.error);
          return;
        }
        allTags = data;
        renderTags();
      } catch (e) {
        console.error('failed to load tags', e);
      }
    }

    async function loadPopular() {
      try {
        const res = await fetch(`${API_URL}/popular`);
        const data = await res.json();
        if (!data.error) {
          popularSearches = data.slice(0, 5);
          renderSuggestions();
        }
      } catch (e) {
        console.error('failed to load popular', e);
      }
    }

    function renderSuggestions() {
      if (popularSearches.length === 0) {
        suggestionsDiv.innerHTML = '';
        return;
      }
      suggestionsDiv.innerHTML = `
        <div class="suggestions">
          <span class="suggestions-label">popular searches:</span>
          <span class="suggestions-list">
            ${popularSearches.map(p => `<span class="suggestion" onclick="searchPopular('${escapeHtml(p.query)}')">${escapeHtml(p.query)}</span>`).join('')}
          </span>
        </div>
      `;
    }

    function renderEmptyState() {
      resultsDiv.innerHTML = `
        <div class="empty-state">
          <p>search atproto publishing platforms</p>
          <p style="font-size:11px;margin-top:0.5rem"><a href="https://leaflet.pub" target="_blank">leaflet</a> · <a href="https://pckt.blog" target="_blank">pckt</a> · <a href="https://offprint.app" target="_blank">offprint</a> · <a href="https://greengale.app" target="_blank">greengale</a> · <a href="https://standard.site" target="_blank">other</a></p>
        </div>
      `;
    }

    function searchPopular(query) {
      queryInput.value = query;
      doSearch();
    }

    searchBtn.addEventListener('click', doSearch);
    queryInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    window.addEventListener('popstate', () => {
      const params = new URLSearchParams(location.search);
      queryInput.value = params.get('q') || '';
      currentTag = params.get('tag') || null;
      currentPlatform = params.get('platform') || null;
      renderActiveFilter();
      renderTags();
      renderPlatformFilter();
      if (queryInput.value || currentTag || currentPlatform) search(queryInput.value, currentTag, currentPlatform);
    });

    // init
    const initialParams = new URLSearchParams(location.search);
    const initialQuery = initialParams.get('q');
    const initialTag = initialParams.get('tag');
    const initialPlatform = initialParams.get('platform');
    if (initialQuery) queryInput.value = initialQuery;
    if (initialTag) currentTag = initialTag;
    if (initialPlatform) currentPlatform = initialPlatform;
    renderActiveFilter();
    renderPlatformFilter();

    if (initialQuery || initialTag || initialPlatform) {
      search(initialQuery || '', initialTag, initialPlatform);
    }

    async function loadRelated(topResult) {
      // show loading state
      const loadingEl = document.createElement('div');
      loadingEl.className = 'related-loading';
      loadingEl.textContent = 'finding related...';
      resultsDiv.appendChild(loadingEl);

      try {
        const res = await fetch(`${API_URL}/similar?uri=${encodeURIComponent(topResult.uri)}`);
        const related = await res.json();

        loadingEl.remove();

        if (!related || related.length === 0) return;

        // filter out the top result itself and limit to 4
        const filtered = related
          .filter(r => r.uri !== topResult.uri)
          .slice(0, 4);

        if (filtered.length === 0) return;

        const items = filtered.map(doc => {
          const platform = doc.platform || 'leaflet';
          const url = buildDocUrl(doc, doc.type || 'article', platform);
          return url
            ? `<a href="${url}" target="_blank" class="related-item">${escapeHtml(doc.title || 'Untitled')}</a>`
            : `<span class="related-item">${escapeHtml(doc.title || 'Untitled')}</span>`;
        }).join('');

        const relatedHtml = `
          <div class="related-section">
            <div class="related-header">related to "${escapeHtml(topResult.title?.slice(0, 30) || 'top result')}${topResult.title?.length > 30 ? '...' : ''}"</div>
            <div class="related-items">${items}</div>
          </div>
        `;

        resultsDiv.insertAdjacentHTML('beforeend', relatedHtml);
      } catch (e) {
        loadingEl.remove();
      }
    }

    loadTags();
    loadPopular();

    fetch(`${API_URL}/stats`)
      .then(r => r.json())
      .then(data => {
        statsDiv.innerHTML = `${data.documents} documents, ${data.publications} publications · <a href="${API_URL}/dashboard" target="_blank">stats</a>`;
      })
      .catch(() => {
        statsDiv.textContent = 'connecting...';
      });
  </script>
</body>
</html>
