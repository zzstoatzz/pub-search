<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>leaflet search</title>
  <meta name="description" content="full-text search for leaflet documents on atproto">
  <meta property="og:title" content="leaflet search">
  <meta property="og:description" content="full-text search for leaflet documents on atproto">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="leaflet search">
  <meta name="twitter:description" content="full-text search for leaflet documents on atproto">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0a0a0a;
      color: #ccc;
      min-height: 100vh;
      padding: 1rem;
      font-size: 14px;
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    a { color: #1B7340; text-decoration: none; }
    a:hover { color: #2a9d5c; }

    h1 {
      font-size: 12px;
      font-weight: normal;
      margin-bottom: 1.5rem;
    }

    h1 a.title {
      color: #888;
    }

    h1 a.title:hover {
      color: #fff;
    }

    h1 a.src {
      font-size: 10px;
      color: #444;
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.5rem;
      font-family: monospace;
      font-size: 14px;
      background: #111;
      border: 1px solid #333;
      color: #ccc;
    }

    input[type="text"]:focus { outline: 1px solid #1B7340; }

    button {
      padding: 0.5rem 1rem;
      font-family: monospace;
      font-size: 14px;
      background: #111;
      border: 1px solid #333;
      color: #ccc;
      cursor: pointer;
    }

    button:hover { background: #222; }
    button:disabled { color: #555; cursor: not-allowed; }

    .results {
      display: flex;
      flex-direction: column;
    }

    .result {
      border-bottom: 1px solid #222;
      padding: 1rem 0;
    }

    .result:hover { background: #111; margin: 0 -0.5rem; padding: 1rem 0.5rem; }

    .result-title {
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .result-title a { color: inherit; }
    .result-title a:hover { color: #2a9d5c; }

    .result-snippet {
      font-size: 12px;
      color: #888;
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .result-snippet mark {
      background: rgba(27, 115, 64, 0.3);
      color: #2a9d5c;
      padding: 0 2px;
    }

    .result-meta {
      font-size: 11px;
      color: #555;
    }

    .entity-type {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-right: 8px;
      text-transform: lowercase;
    }

    .entity-type.article {
      background: rgba(27, 115, 64, 0.2);
      color: #2a9d5c;
    }

    .entity-type.looseleaf {
      background: rgba(100, 100, 100, 0.2);
      color: #888;
    }

    .entity-type.publication {
      background: rgba(64, 115, 180, 0.2);
      color: #6a9fd4;
    }

    .status {
      padding: 1rem;
      text-align: center;
      color: #666;
    }

    .error { color: #c44; }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #555;
    }

    .empty-state p { margin-bottom: 0.5rem; }

    .stats {
      font-size: 11px;
      color: #555;
      margin-top: 1.5rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><a href="/" class="title">leaflet search</a> <a href="https://tangled.sh/@zzstoatzz.io/leaflet-search" target="_blank" class="src">[src]</a></h1>

    <div class="search-box">
      <input type="text" id="query" placeholder="search content..." autofocus>
      <button id="search-btn">search</button>
    </div>

    <div id="results" class="results">
      <div class="empty-state">
        <p>full-text search for leaflet documents</p>
        <p>searches titles and content</p>
      </div>
    </div>

    <div id="stats" class="stats"></div>
  </div>

  <script>
    const API_URL = 'https://leaflet-search-backend.fly.dev';

    const queryInput = document.getElementById('query');
    const searchBtn = document.getElementById('search-btn');
    const resultsDiv = document.getElementById('results');
    const statsDiv = document.getElementById('stats');

    async function search(query) {
      if (!query.trim()) return;

      searchBtn.disabled = true;
      const searchUrl = `${API_URL}/search?q=${encodeURIComponent(query)}`;
      resultsDiv.innerHTML = `<div class="status">searching...<br><code style="font-size:0.7rem;color:#525252">${searchUrl}</code></div>`;

      try {
        const res = await fetch(searchUrl);
        const rawText = await res.text();
        let results;

        try {
          results = JSON.parse(rawText);
        } catch (parseErr) {
          resultsDiv.innerHTML = `<div class="status error">JSON parse error<pre style="text-align:left;font-size:0.7rem;overflow:auto;max-height:200px">${escapeHtml(rawText)}</pre></div>`;
          return;
        }

        if (results.error) {
          resultsDiv.innerHTML = `<div class="status error">${results.error}</div>`;
          return;
        }

        if (results.length === 0) {
          resultsDiv.innerHTML = `
            <div class="empty-state">
              <p>no results for "${escapeHtml(query)}"</p>
              <p>try different keywords</p>
              <p style="margin-top:1rem;font-size:0.7rem;color:#404040">query sent: <code>${searchUrl}</code></p>
              <p style="font-size:0.7rem;color:#404040">response: <code>${escapeHtml(rawText)}</code></p>
            </div>
          `;
          statsDiv.textContent = '';
          return;
        }

        let html = `<div style="font-size:0.7rem;color:#404040;margin-bottom:1rem;padding:0.5rem;background:#111;border-radius:4px">
          query: <code>${escapeHtml(query)}</code> | ${results.length} results
        </div>`;

        for (const doc of results) {
          const entityType = doc.type || 'article';

          // build URL based on entity type
          let leafletUrl = null;
          if (entityType === 'publication') {
            // publications link to their base path
            leafletUrl = doc.basePath ? `https://${doc.basePath}` : null;
          } else {
            // articles and looseleafs link to specific document
            leafletUrl = doc.basePath && doc.rkey
              ? `https://${doc.basePath}/${doc.rkey}`
              : (doc.did && doc.rkey ? `https://leaflet.pub/p/${doc.did}/${doc.rkey}` : null);
          }

          const date = doc.createdAt ? new Date(doc.createdAt).toLocaleDateString() : '';
          html += `
            <div class="result">
              <div class="result-title">
                <span class="entity-type ${entityType}">${entityType}</span>
                ${leafletUrl
                  ? `<a href="${leafletUrl}" target="_blank">${escapeHtml(doc.title || 'Untitled')}</a>`
                  : escapeHtml(doc.title || 'Untitled')}
              </div>
              <div class="result-snippet">${doc.snippet || ''}</div>
              <div class="result-meta">
                ${date ? `${date} | ` : ''}${doc.basePath
                  ? `<a href="https://${doc.basePath}" target="_blank">${doc.basePath}</a>`
                  : `<a href="https://leaflet.pub" target="_blank">leaflet.pub</a>`}
              </div>
            </div>
          `;
        }

        resultsDiv.innerHTML = html;
        statsDiv.textContent = `${results.length} results`;

      } catch (err) {
        resultsDiv.innerHTML = `<div class="status error">error: ${err.message}<br><code style="font-size:0.7rem">${searchUrl}</code></div>`;
      } finally {
        searchBtn.disabled = false;
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    searchBtn.addEventListener('click', () => {
      const q = queryInput.value;
      if (q.trim()) history.pushState(null, '', `?q=${encodeURIComponent(q)}`);
      search(q);
    });
    queryInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const q = queryInput.value;
        if (q.trim()) history.pushState(null, '', `?q=${encodeURIComponent(q)}`);
        search(q);
      }
    });

    // handle back/forward navigation
    window.addEventListener('popstate', () => {
      const params = new URLSearchParams(location.search);
      const q = params.get('q') || '';
      queryInput.value = q;
      if (q) search(q);
    });

    // check for ?q= on page load
    const initialParams = new URLSearchParams(location.search);
    const initialQuery = initialParams.get('q');
    if (initialQuery) {
      queryInput.value = initialQuery;
      search(initialQuery);
    }

    // check backend health on load
    fetch(`${API_URL}/stats`)
      .then(r => r.json())
      .then(data => {
        statsDiv.textContent = `index: ${data.documents} documents, ${data.publications} publications`;
      })
      .catch(() => {
        statsDiv.textContent = 'backend: connecting...';
      });
  </script>
</body>
</html>
