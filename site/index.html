<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>leaflet search</title>
  <meta name="description" content="search for leaflet">
  <meta property="og:title" content="leaflet search">
  <meta property="og:description" content="search for leaflet">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="leaflet search">
  <meta name="twitter:description" content="search for leaflet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0a0a0a;
      color: #ccc;
      min-height: 100vh;
      padding: 1rem;
      font-size: 14px;
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    a { color: #1B7340; text-decoration: none; }
    a:hover { color: #2a9d5c; }

    h1 {
      font-size: 12px;
      font-weight: normal;
      margin-bottom: 1.5rem;
    }

    h1 a.title {
      color: #888;
    }

    h1 a.title:hover {
      color: #fff;
    }

    h1 a.src {
      font-size: 10px;
      color: #444;
    }

    h1 .by {
      font-size: 10px;
      color: #555;
    }

    h1 .by a {
      color: #555;
    }

    h1 .by a:hover {
      color: #1B7340;
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.5rem;
      font-family: monospace;
      font-size: 14px;
      background: #111;
      border: 1px solid #333;
      color: #ccc;
    }

    input[type="text"]:focus { outline: 1px solid #1B7340; }

    button {
      padding: 0.5rem 1rem;
      font-family: monospace;
      font-size: 14px;
      background: #111;
      border: 1px solid #333;
      color: #ccc;
      cursor: pointer;
    }

    button:hover { background: #222; }
    button:disabled { color: #555; cursor: not-allowed; }

    .results {
      display: flex;
      flex-direction: column;
    }

    .result {
      border-bottom: 1px solid #222;
      padding: 1rem 0;
    }

    .result:hover { background: #111; margin: 0 -0.5rem; padding: 1rem 0.5rem; }

    .result-title {
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .result-title a { color: inherit; }
    .result-title a:hover { color: #2a9d5c; }

    .result-snippet {
      font-size: 12px;
      color: #888;
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .result-snippet mark {
      background: rgba(27, 115, 64, 0.3);
      color: #2a9d5c;
      padding: 0 2px;
    }

    .result-meta {
      font-size: 11px;
      color: #555;
    }

    .entity-type {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      margin-right: 8px;
      text-transform: lowercase;
    }

    .entity-type.article {
      background: rgba(27, 115, 64, 0.2);
      color: #2a9d5c;
    }

    .entity-type.looseleaf {
      background: rgba(100, 100, 100, 0.2);
      color: #888;
    }

    .entity-type.publication {
      background: rgba(64, 115, 180, 0.2);
      color: #6a9fd4;
    }

    .status {
      padding: 1rem;
      text-align: center;
      color: #666;
    }

    .error { color: #c44; }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #555;
    }

    .empty-state p { margin-bottom: 0.5rem; }

    .suggestions {
      font-size: 11px;
      color: #444;
      margin-bottom: 1.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .suggestions-label {
      color: #555;
      margin-right: 0.25rem;
    }

    .suggestions-list {
      display: inline;
    }

    .suggestion {
      color: #666;
      cursor: pointer;
      font-style: italic;
    }

    .suggestion::before {
      content: '"';
      color: #444;
    }

    .suggestion::after {
      content: '"';
      color: #444;
      margin-right: 0.5rem;
    }

    .suggestion:hover {
      color: #2a9d5c;
    }

    .suggestion:hover::before,
    .suggestion:hover::after {
      color: #2a9d5c;
    }

    .stats {
      font-size: 11px;
      color: #555;
      margin-top: 1.5rem;
      text-align: center;
    }

    .related-section {
      margin-top: 1rem;
      padding-top: 0;
    }

    .related-header {
      font-size: 11px;
      color: #444;
      margin-bottom: 0.75rem;
    }

    .related-loading {
      font-size: 11px;
      color: #666;
      margin-top: 1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    .related-items {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .related-item {
      font-size: 12px;
      padding: 0.4rem 0.6rem;
      background: #111;
      border: 1px solid #222;
      border-radius: 3px;
      color: #888;
      text-decoration: none;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .related-item:hover {
      background: #1a1a1a;
      border-color: #333;
      color: #aaa;
    }

    .tags {
      margin-bottom: 1rem;
    }

    .tags-label {
      font-size: 11px;
      color: #444;
      margin-bottom: 0.5rem;
    }

    .tags-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      background: #151515;
      border: 1px solid #252525;
      border-radius: 3px;
      cursor: pointer;
      color: #777;
    }

    .tag:hover {
      background: #1a1a1a;
      border-color: #333;
      color: #aaa;
    }

    .tag.active {
      background: rgba(27, 115, 64, 0.2);
      border-color: #1B7340;
      color: #2a9d5c;
    }

    .tag .count {
      color: #444;
      margin-left: 4px;
    }

    .active-filter {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.5rem;
      background: rgba(27, 115, 64, 0.1);
      border: 1px solid #1B7340;
      border-radius: 4px;
      font-size: 12px;
    }

    .active-filter .clear {
      margin-left: auto;
      color: #666;
      cursor: pointer;
    }

    .active-filter .clear:hover {
      color: #c44;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><a href="/" class="title">leaflet search</a> <span class="by">by <a href="https://bsky.app/profile/zzstoatzz.io" target="_blank">@zzstoatzz.io</a></span> <a href="https://tangled.sh/@zzstoatzz.io/leaflet-search" target="_blank" class="src">[src]</a></h1>

    <div class="search-box">
      <input type="text" id="query" placeholder="search content..." autofocus>
      <button id="search-btn">search</button>
    </div>

    <div id="suggestions"></div>

    <div id="active-filter"></div>

    <div id="tags" class="tags"></div>

    <div id="results" class="results">
      <div class="empty-state">
        <p>search for <a href="https://leaflet.pub" target="_blank">leaflet.pub</a></p>
      </div>
    </div>

    <div id="stats" class="stats"></div>
  </div>

  <script>
    const API_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? 'http://localhost:8080'
      : 'https://leaflet-search-backend.fly.dev';

    const queryInput = document.getElementById('query');
    const searchBtn = document.getElementById('search-btn');
    const resultsDiv = document.getElementById('results');
    const statsDiv = document.getElementById('stats');
    const tagsDiv = document.getElementById('tags');
    const activeFilterDiv = document.getElementById('active-filter');
    const suggestionsDiv = document.getElementById('suggestions');

    let currentTag = null;
    let allTags = [];
    let popularSearches = [];

    async function search(query, tag = null) {
      if (!query.trim() && !tag) return;

      searchBtn.disabled = true;
      let searchUrl = `${API_URL}/search?q=${encodeURIComponent(query || '')}`;
      if (tag) searchUrl += `&tag=${encodeURIComponent(tag)}`;
      resultsDiv.innerHTML = `<div class="status">searching...</div>`;

      try {
        const res = await fetch(searchUrl);
        const rawText = await res.text();
        let results;

        try {
          results = JSON.parse(rawText);
        } catch (parseErr) {
          resultsDiv.innerHTML = `<div class="status error">JSON parse error<pre style="text-align:left;font-size:0.7rem;overflow:auto;max-height:200px">${escapeHtml(rawText)}</pre></div>`;
          return;
        }

        if (results.error) {
          resultsDiv.innerHTML = `<div class="status error">${results.error}</div>`;
          return;
        }

        if (results.length === 0) {
          resultsDiv.innerHTML = `
            <div class="empty-state">
              <p>no results${query ? ` for "${escapeHtml(query)}"` : ''}${tag ? ` in #${escapeHtml(tag)}` : ''}</p>
              <p>try different keywords</p>
            </div>
          `;
          statsDiv.textContent = '';
          return;
        }

        let html = '';

        for (const doc of results) {
          const entityType = doc.type || 'article';

          // build URL based on entity type
          let leafletUrl = null;
          if (entityType === 'publication') {
            // publications link to their base path
            leafletUrl = doc.basePath ? `https://${doc.basePath}` : null;
          } else {
            // articles and looseleafs link to specific document
            leafletUrl = doc.basePath && doc.rkey
              ? `https://${doc.basePath}/${doc.rkey}`
              : (doc.did && doc.rkey ? `https://leaflet.pub/p/${doc.did}/${doc.rkey}` : null);
          }

          const date = doc.createdAt ? new Date(doc.createdAt).toLocaleDateString() : '';
          html += `
            <div class="result">
              <div class="result-title">
                <span class="entity-type ${entityType}">${entityType}</span>
                ${leafletUrl
                  ? `<a href="${leafletUrl}" target="_blank">${escapeHtml(doc.title || 'Untitled')}</a>`
                  : escapeHtml(doc.title || 'Untitled')}
              </div>
              <div class="result-snippet">${highlightTerms(doc.snippet, query)}</div>
              <div class="result-meta">
                ${date ? `${date} | ` : ''}${doc.basePath
                  ? `<a href="https://${doc.basePath}" target="_blank">${doc.basePath}</a>`
                  : `<a href="https://leaflet.pub" target="_blank">leaflet.pub</a>`}
              </div>
            </div>
          `;
        }

        resultsDiv.innerHTML = html;
        statsDiv.textContent = `${results.length} results`;

        // load related documents based on top result
        if (results.length > 0 && results[0].uri) {
          loadRelated(results[0]);
        }

      } catch (err) {
        resultsDiv.innerHTML = `<div class="status error">error: ${err.message}<br><code style="font-size:0.7rem">${searchUrl}</code></div>`;
      } finally {
        searchBtn.disabled = false;
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    function highlightTerms(text, query) {
      if (!text || !query) return escapeHtml(text);
      const terms = query.toLowerCase().split(/\s+/).filter(t => t.length > 0);
      if (terms.length === 0) return escapeHtml(text);

      // build regex that matches any term (case insensitive)
      const escaped = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
      const regex = new RegExp(`(${escaped.join('|')})`, 'gi');

      // escape HTML first, then apply highlights
      return escapeHtml(text).replace(regex, '<mark>$1</mark>');
    }

    function updateUrl() {
      const params = new URLSearchParams();
      const q = queryInput.value.trim();
      if (q) params.set('q', q);
      if (currentTag) params.set('tag', currentTag);
      const url = params.toString() ? `?${params}` : '/';
      history.pushState(null, '', url);
    }

    function doSearch() {
      updateUrl();
      search(queryInput.value, currentTag);
    }

    function setTag(tag) {
      currentTag = tag;
      renderActiveFilter();
      renderTags();
      doSearch();
    }

    function clearTag() {
      currentTag = null;
      renderActiveFilter();
      renderTags();
      updateUrl();
      if (queryInput.value.trim()) {
        search(queryInput.value, null);
      } else {
        renderEmptyState();
      }
    }

    function renderActiveFilter() {
      if (!currentTag) {
        activeFilterDiv.innerHTML = '';
        return;
      }
      activeFilterDiv.innerHTML = `
        <div class="active-filter">
          <span>filtering by tag: <strong>#${escapeHtml(currentTag)}</strong> <span style="color:#666;font-size:10px">(documents only)</span></span>
          <span class="clear" onclick="clearTag()">× clear</span>
        </div>
      `;
    }

    function renderTags() {
      if (allTags.length === 0) {
        tagsDiv.innerHTML = '';
        return;
      }
      const html = allTags.slice(0, 15).map(t => `
        <span class="tag${currentTag === t.tag ? ' active' : ''}" onclick="setTag('${escapeHtml(t.tag)}')">${escapeHtml(t.tag)}<span class="count">${t.count}</span></span>
      `).join('');
      tagsDiv.innerHTML = `<div class="tags-label">filter by tag:</div><div class="tags-list">${html}</div>`;
    }

    async function loadTags() {
      try {
        const res = await fetch(`${API_URL}/tags`);
        const data = await res.json();
        if (data.error) {
          console.error('failed to load tags:', data.error);
          return;
        }
        allTags = data;
        renderTags();
      } catch (e) {
        console.error('failed to load tags', e);
      }
    }

    async function loadPopular() {
      try {
        const res = await fetch(`${API_URL}/popular`);
        const data = await res.json();
        if (!data.error) {
          popularSearches = data.slice(0, 5);
          renderSuggestions();
        }
      } catch (e) {
        console.error('failed to load popular', e);
      }
    }

    function renderSuggestions() {
      if (popularSearches.length === 0) {
        suggestionsDiv.innerHTML = '';
        return;
      }
      suggestionsDiv.innerHTML = `
        <div class="suggestions">
          <span class="suggestions-label">popular searches:</span>
          <span class="suggestions-list">
            ${popularSearches.map(p => `<span class="suggestion" onclick="searchPopular('${escapeHtml(p.query)}')">${escapeHtml(p.query)}</span>`).join('')}
          </span>
        </div>
      `;
    }

    function renderEmptyState() {
      resultsDiv.innerHTML = `
        <div class="empty-state">
          <p>search for <a href="https://leaflet.pub" target="_blank">leaflet.pub</a></p>
        </div>
      `;
    }

    function searchPopular(query) {
      queryInput.value = query;
      doSearch();
    }

    searchBtn.addEventListener('click', doSearch);
    queryInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    window.addEventListener('popstate', () => {
      const params = new URLSearchParams(location.search);
      queryInput.value = params.get('q') || '';
      currentTag = params.get('tag') || null;
      renderActiveFilter();
      renderTags();
      if (queryInput.value || currentTag) search(queryInput.value, currentTag);
    });

    // init
    const initialParams = new URLSearchParams(location.search);
    const initialQuery = initialParams.get('q');
    const initialTag = initialParams.get('tag');
    if (initialQuery) queryInput.value = initialQuery;
    if (initialTag) currentTag = initialTag;
    renderActiveFilter();

    if (initialQuery || initialTag) {
      search(initialQuery || '', initialTag);
    }

    async function loadRelated(topResult) {
      // show loading state
      const loadingEl = document.createElement('div');
      loadingEl.className = 'related-loading';
      loadingEl.textContent = 'finding related...';
      resultsDiv.appendChild(loadingEl);

      try {
        const res = await fetch(`${API_URL}/similar?uri=${encodeURIComponent(topResult.uri)}`);
        const related = await res.json();

        loadingEl.remove();

        if (!related || related.length === 0) return;

        // filter out the top result itself and limit to 4
        const filtered = related
          .filter(r => r.uri !== topResult.uri)
          .slice(0, 4);

        if (filtered.length === 0) return;

        const items = filtered.map(doc => {
          const url = doc.basePath && doc.rkey
            ? `https://${doc.basePath}/${doc.rkey}`
            : (doc.did && doc.rkey ? `https://leaflet.pub/p/${doc.did}/${doc.rkey}` : null);
          return url
            ? `<a href="${url}" target="_blank" class="related-item">${escapeHtml(doc.title || 'Untitled')}</a>`
            : `<span class="related-item">${escapeHtml(doc.title || 'Untitled')}</span>`;
        }).join('');

        const relatedHtml = `
          <div class="related-section">
            <div class="related-header">related to "${escapeHtml(topResult.title?.slice(0, 30) || 'top result')}${topResult.title?.length > 30 ? '...' : ''}"</div>
            <div class="related-items">${items}</div>
          </div>
        `;

        resultsDiv.insertAdjacentHTML('beforeend', relatedHtml);
      } catch (e) {
        loadingEl.remove();
      }
    }

    loadTags();
    loadPopular();

    fetch(`${API_URL}/stats`)
      .then(r => r.json())
      .then(data => {
        statsDiv.innerHTML = `${data.documents} documents, ${data.publications} publications · <a href="${API_URL}/dashboard" target="_blank">stats</a>`;
      })
      .catch(() => {
        statsDiv.textContent = 'connecting...';
      });
  </script>
</body>
</html>
