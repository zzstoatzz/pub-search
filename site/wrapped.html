  <style>
    :root, [data-theme="dark"] {
      --bg: #050505;
      --bg-subtle: #0d0d0d;
      --bg-hover: #141414;
      --border: #1d1d1d;
      --border-subtle: #161616;
      --border-focus: #2a2a2a;
      --text: #ccc;
      --text-bright: #fff;
      --text-secondary: #888;
      --text-dim: #777;
      --text-muted: #444;
      --accent: #2a9d5c;
      --accent-dim: #1B7340;
      --gold: #d9a441;
      --podium-bg: rgba(42, 157, 92, 0.04);
      --podium-border: rgba(42, 157, 92, 0.25);
    }
    [data-theme="light"] {
      --bg: #f5f5f0;
      --bg-subtle: #eee;
      --bg-hover: #e4e4e0;
      --border: #ddd;
      --border-subtle: #ccc;
      --border-focus: #bbb;
      --text: #333;
      --text-bright: #111;
      --text-secondary: #555;
      --text-dim: #666;
      --text-muted: #999;
      --accent: #1B7340;
      --accent-dim: #2a9d5c;
      --gold: #b8860b;
      --podium-bg: rgba(27, 115, 64, 0.05);
      --podium-border: rgba(27, 115, 64, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.25rem 1rem 4rem;
      font-size: 14px;
      line-height: 1.6;
    }
    .container { max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }
    a { color: var(--accent-dim); text-decoration: none; }
    a:hover { color: var(--accent); }

    /* ambient constellation — a calm, dim backdrop (coral-inspired); the
       brand's dot/star favicon, brought to life. behind everything, inert. */
    #ambient {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none; display: block;
    }

    h1 {
      font-size: 12px;
      font-weight: normal;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    h1 a.title { color: var(--text-secondary); }
    h1 a.title:hover { color: var(--text-bright); }
    h1 .dim { color: var(--text-dim); }
    h1 .dim a { color: inherit; text-decoration: none; }
    h1 .dim a:hover { color: var(--text-bright); }
    h1 .lf-settings-btn { margin-left: auto; }
    .theme-toggle {
      cursor: pointer; color: var(--text-dim); user-select: none;
      padding: 0.3rem 0.4rem; display: inline-flex; align-items: center;
      justify-content: center; background: none; border: none; font: inherit;
      min-width: 44px; min-height: 44px;
    }
    .theme-toggle:hover { color: var(--text-secondary); }
    .theme-toggle:focus-visible { outline: 2px solid var(--border-focus); outline-offset: 2px; }

    /* ---- entry (no handle yet) ------------------------------------------ */
    .entry { margin-top: 2rem; }
    .entry .lead {
      font-size: 18px; color: var(--text-bright); line-height: 1.4;
      margin-bottom: 0.4rem; letter-spacing: -0.01em;
    }
    .entry .sub { color: var(--text-secondary); margin-bottom: 1.25rem; }

    /* freshness note: this digest is served from a periodic snapshot, so very
       recent activity lags. derived live from /snapshot's source_watermark. */
    .freshness {
      margin-top: 1.5rem; text-align: center;
      color: var(--text-secondary); font-size: 12px; opacity: 0.65;
      line-height: 1.4;
    }
    .freshness .dot { color: var(--accent); }
    .entry form { display: flex; gap: 0.5rem; }
    .entry .ta-wrap { position: relative; flex: 1; min-width: 0; }
    .entry input {
      /* 16px (not the inherited 14px) so iOS Safari doesn't zoom on focus.
         the `font` shorthand would reset this, so set family + size explicitly. */
      width: 100%; min-width: 0; font-family: inherit; font-size: 16px;
      padding: 0.7rem 0.8rem;
      background: var(--bg-subtle); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-bright);
    }
    .entry input:focus { outline: none; border-color: var(--border-focus); }
    .entry input::placeholder { color: var(--text-muted); }
    .entry button[type=submit] {
      font: inherit; padding: 0.7rem 1rem; cursor: pointer;
      background: var(--accent-dim); color: #fff; border: none; border-radius: 8px;
    }
    .entry button[type=submit]:hover { background: var(--accent); }

    /* ---- identity header ------------------------------------------------ */
    .who {
      display: flex; align-items: center; gap: 0.9rem;
      margin-bottom: 1.75rem; min-height: 56px;
    }
    .who-avatar {
      flex: 0 0 auto; width: 56px; height: 56px; border-radius: 50%;
      overflow: hidden; background: var(--bg-hover);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .who-avatar.loading {
      background: linear-gradient(90deg, var(--bg-hover) 0%, var(--border) 50%, var(--bg-hover) 100%);
      background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite;
    }
    .who-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .who-avatar .ini { font-size: 22px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; }
    .who-text { min-width: 0; }
    .who-name { font-size: 17px; color: var(--text-bright); font-weight: 600; line-height: 1.2; word-break: break-word; }
    .who-handle { color: var(--text-secondary); }
    .who-handle .at { color: var(--text-dim); }
    /* semantic neighborhood membership (from atlas clusters) */
    .who-hoods { margin-top: 0.55rem; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .who-hoods .hood-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-right: 2px; }
    .who-hoods .hood-chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent); font-size: 12px; color: var(--text); }
    .who-hoods .hood-chip b { font-weight: 600; }
    .who-hoods .hood-chip .sz { color: var(--text-muted); font-size: 11px; font-variant-numeric: tabular-nums; }
    .who-hoods .hood-chip.huge { background: color-mix(in srgb, var(--accent) 18%, transparent); border-color: color-mix(in srgb, var(--accent) 55%, transparent); }
    .who-hoods .hood-chip.huge .tag { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); font-weight: 700; }
    .who-hoods .hood-chip { cursor: default; transition: background 0.15s, border-color 0.15s; }
    .who-hoods .hood-chip.lit { background: color-mix(in srgb, var(--accent) 26%, transparent); border-color: var(--accent); }
    .who-tag { color: var(--text-dim); font-size: 12px; margin-top: 0.15rem; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ---- lens cards ----------------------------------------------------- */
    .cards { display: flex; flex-direction: column; gap: 0.85rem; }
    /* liquid glass — translucent + blurred so the centered atlas shows through */
    .card {
      border: 1px solid var(--border-focus);
      border-radius: 14px;
      background: color-mix(in srgb, var(--bg-subtle) 58%, transparent);
      backdrop-filter: blur(16px) saturate(150%);
      -webkit-backdrop-filter: blur(16px) saturate(150%);
      box-shadow:
        inset 0 1px 0 0 color-mix(in srgb, var(--text-bright) 8%, transparent),
        0 12px 34px -14px rgba(0, 0, 0, 0.7);
      padding: 1.1rem 1.15rem;
      opacity: 0; transform: translateY(8px);
      animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .card:nth-child(1) { animation-delay: 0.04s; }
    .card:nth-child(2) { animation-delay: 0.12s; }
    .card:nth-child(3) { animation-delay: 0.20s; }
    @keyframes rise { to { opacity: 1; transform: none; } }

    .card-head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 0.5rem; margin-bottom: 0.6rem;
    }
    .card-label {
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-dim);
    }
    .rank-badge {
      font-size: 12px; color: var(--text-secondary);
      border: 1px solid var(--border-focus); border-radius: 999px;
      padding: 0.12rem 0.5rem; white-space: nowrap;
    }
    .rank-badge.podium { color: var(--gold); border-color: var(--gold); }
    .rank-badge .n { color: var(--text-bright); font-weight: 600; }
    .rank-badge.podium .n { color: var(--gold); }

    .metric { display: flex; align-items: baseline; gap: 0.5rem; }
    .metric .num {
      font-size: 40px; line-height: 1; color: var(--accent);
      font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
    }
    .metric .unit { font-size: 14px; color: var(--text-secondary); }
    .card-sub { color: var(--text-secondary); margin-top: 0.55rem; font-size: 13px; }
    .card-sub .hi { color: var(--text-bright); }

    .toppub {
      margin-top: 0.7rem; padding-top: 0.7rem;
      border-top: 1px solid var(--border-subtle);
      font-size: 13px; color: var(--text-secondary);
    }
    .toppub .lbl { color: var(--text-dim); }
    .toppub a { color: var(--text-bright); }
    .toppub a:hover { color: var(--accent); }

    .empty { color: var(--text-muted); font-size: 13px; font-style: italic; }

    /* avatar anchors shouldn't look like links */
    .sea-av, .reco-av { text-decoration: none; color: inherit; }

    /* section sub-header inside a card (e.g. "who subscribes") */
    .card-section {
      margin-top: 0.9rem; padding-top: 0.85rem;
      border-top: 1px solid var(--border-subtle);
    }
    .card-section .sec-label {
      font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 0.55rem; display: block;
    }
    .sec-loading { color: var(--text-muted); font-size: 12px; }

    /* recommended-docs view tabs (recent vs most-recommended) */
    .reco-tabs {
      display: flex; gap: 0.4rem; margin-bottom: 0.7rem; flex-wrap: wrap;
    }
    .reco-tab {
      font: inherit; font-size: 11px; letter-spacing: 0.04em;
      text-transform: uppercase; cursor: pointer;
      color: var(--text-secondary); background: var(--bg-subtle);
      border: 1px solid var(--border-subtle); border-radius: 999px;
      padding: 0.35rem 0.7rem; min-height: 30px; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .reco-tab:hover { color: var(--text-bright); }
    .reco-tab[aria-selected="true"] {
      color: var(--accent); border-color: var(--accent-dim);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
    }

    /* ---- author lens: platform bar, cadence sparkline, topics ---------- */
    .pf-bar { display: flex; height: 10px; border-radius: 5px; overflow: hidden; background: var(--bg-hover); }
    .pf-seg { height: 100%; }
    .pf-seg:not(:last-child) { box-shadow: 1px 0 0 var(--bg-subtle); }
    .pf-legend { display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; margin-top: 0.55rem; }
    .pf-leg { font-size: 12px; color: var(--text-secondary); display: inline-flex; align-items: center; gap: 5px; }
    .pf-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
    .pf-leg .pf-n { color: var(--text-bright); font-variant-numeric: tabular-nums; }
    .spark { display: flex; align-items: flex-end; gap: 2px; height: 44px; }
    .spark-bar { flex: 1 1 0; min-width: 3px; background: var(--accent-dim); border-radius: 2px 2px 0 0; opacity: 0.85; }
    .spark-cap { margin-top: 0.45rem; font-size: 12px; color: var(--text-dim); }
    .spark-cap b { color: var(--text-bright); font-weight: 600; }
    .topic-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .topic-chip { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 999px;
      background: var(--bg-hover); border: 1px solid var(--border); font-size: 12px; color: var(--text); }
    .topic-chip .topic-n { color: var(--text-dim); font-size: 11px; font-variant-numeric: tabular-nums; }

    /* a sea of subscriber avatars — dense wrap of small circles */
    .sea { display: flex; flex-wrap: wrap; gap: 4px; }
    .sea-av {
      width: 28px; height: 28px; border-radius: 50%; overflow: hidden;
      background: var(--bg-hover); display: inline-flex; align-items: center;
      justify-content: center; flex: 0 0 auto;
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .sea-av:hover { transform: translateY(-2px) scale(1.12); z-index: 2; }
    .sea-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sea-av .ini { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; }
    .sea-more {
      align-self: center; font-size: 12px; color: var(--text-dim);
      padding-left: 0.25rem; white-space: nowrap;
    }

    /* recently-recommended document list */
    .reco-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .reco { display: flex; align-items: center; gap: 0.55rem; min-width: 0; }
    .reco-av {
      width: 26px; height: 26px; border-radius: 50%; overflow: hidden;
      background: var(--bg-hover); display: inline-flex; align-items: center;
      justify-content: center; flex: 0 0 auto;
    }
    .reco-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .reco-av .ini { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; }
    .reco-body { min-width: 0; flex: 1; }
    .reco-title {
      font-size: 13px; color: var(--text-bright); line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .reco-title a { color: inherit; }
    .reco-title a:hover { color: var(--accent); }
    .reco-meta { font-size: 11px; color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* following avatar strip */
    .follow-strip {
      margin-top: 0.8rem; display: flex; flex-wrap: wrap; gap: 0.5rem;
    }
    .follow-pub {
      display: inline-flex; align-items: center; gap: 0.4rem;
      max-width: 100%; padding: 0.25rem 0.55rem 0.25rem 0.3rem;
      border: 1px solid var(--border); border-radius: 999px;
      color: var(--text); background: var(--bg-hover);
    }
    .follow-pub:hover { border-color: var(--border-focus); color: var(--text-bright); }
    .follow-av {
      flex: 0 0 auto; width: 24px; height: 24px; border-radius: 50%;
      overflow: hidden; background: var(--bg); display: inline-flex;
      align-items: center; justify-content: center;
    }
    .follow-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .follow-av .ini { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; }
    .follow-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

    .status { color: var(--text-secondary); margin-top: 1.5rem; }
    .status.err { color: #c0563f; }

    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; opacity: 1; transform: none; }
      .who-avatar.loading { animation: none; }
    }
    @media (max-width: 480px) {
      .metric .num { font-size: 34px; }
      .who-avatar { width: 48px; height: 48px; }
    }
  </style>

  <script>
    var THEME_ICONS = { dark: '☾', light: '☼', system: '◑' };
    var THEME_CYCLE = ['dark', 'light', 'system'];
    var currentTheme = localStorage.getItem('theme') || 'dark';
    function applyTheme(t) {
      currentTheme = t;
      localStorage.setItem('theme', t);
      var resolved = t === 'system'
        ? (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        : t;
      document.documentElement.setAttribute('data-theme', resolved);
      var el = document.getElementById('theme-toggle');
      if (el) { el.textContent = THEME_ICONS[t]; el.title = t; }
    }
    document.getElementById('theme-toggle').textContent = THEME_ICONS[currentTheme];
    document.getElementById('theme-toggle').title = currentTheme;
    document.getElementById('theme-toggle').addEventListener('click', function() {
      applyTheme(THEME_CYCLE[(THEME_CYCLE.indexOf(currentTheme) + 1) % 3]);
    });
    matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
      if (currentTheme === 'system') applyTheme('system');
    });
  </script>

  <script>
    var API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'http://localhost:3000'
      : 'https://leaflet-search-backend.fly.dev';

    var root = document.getElementById('root');

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    // encode a query value but keep colons readable — DIDs (did:plc:…) are
    // legal with bare colons in a query string, and the encoded %3A is ugly.
    function enc(v) { return encodeURIComponent(v).replace(/%3A/g, ':'); }
    // resolved profile URL for the user's preferred bsky client (localStorage).
    function profileUrl(didOrHandle) {
      try { return (window.LeafletClients && didOrHandle) ? window.LeafletClients.profileUrlFor(didOrHandle) : '#'; }
      catch (e) { return '#'; }
    }
    function shortDid(d) {
      if (!d) return '';
      var p = d.split(':');
      var tail = p[p.length - 1] || d;
      return tail.length > 10 ? tail.slice(0, 6) + '…' + tail.slice(-4) : tail;
    }
    function fmtMonthYear(iso) {
      if (!iso) return null;
      var d = new Date(iso);
      if (isNaN(d)) return null;
      return d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
    }
    function getParam(name) {
      var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
      return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : null;
    }

    // ----- entry screen -------------------------------------------------
    function go(handle) {
      var v = String(handle || '').trim().replace(/^@/, '');
      if (!v) return;
      var key = v.indexOf('did:') === 0 ? 'did' : 'handle';
      history.pushState({}, '', '/wrapped?' + key + '=' + enc(v));
      load();
    }

    function renderEntry() {
      AMBIENT_MY_HOSTS = null; // no personal footprint on the entry screen
      root.innerHTML =
        '<div class="entry">' +
          '<div class="lead">your long-form atmosphere</div>' +
          '<div class="sub">what you publish, who reads it, your semantic neighborhoods, ' +
            'and what you recommend.</div>' +
          '<form id="entry-form">' +
            '<div class="ta-wrap">' +
              '<input id="entry-input" type="text" autocapitalize="off" autocorrect="off" ' +
                'spellcheck="false" autocomplete="off" placeholder="enter a handle (e.g. alice.bsky.social)">' +
            '</div>' +
            '<button type="submit">go</button>' +
          '</form>' +
        '</div>';
      var form = document.getElementById('entry-form');
      var input = document.getElementById('entry-input');
      input.focus();
      setupHandleTypeahead(input, function(actor) {
        input.value = actor.handle;
        go(actor.did || actor.handle);
      });
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        go(input.value);
      });
    }

    // Handle typeahead against nate's community service (typeahead.waow.tech),
    // reusing the shared .lf-typeahead-* dropdown styles from components.css.
    // Unlike the homepage search box this triggers on the bare handle (no '@'
    // prefix) since the whole field IS the handle. We report ourselves via the
    // X-Client header so this shows up by name in the service's traffic stats.
    var TYPEAHEAD_BASE = 'https://typeahead.waow.tech';
    var TYPEAHEAD_CLIENT = 'pub-search.waow.tech/wrapped';

    function setupHandleTypeahead(input, onPick) {
      var DEBOUNCE_MS = 150, LIMIT = 8;
      var dd = document.createElement('div');
      dd.className = 'lf-typeahead-dropdown';
      dd.setAttribute('role', 'listbox');
      input.parentNode.appendChild(dd);

      var timer = null, items = [], sel = -1, last = '';

      function hide() { dd.classList.remove('open'); dd.innerHTML = ''; items = []; sel = -1; }
      function render() {
        dd.innerHTML = items.map(function(a, i) {
          var dn = a.displayName ? '<span class="lf-typeahead-name">' + esc(a.displayName) + '</span>' : '';
          var av = a.avatar
            ? '<img class="lf-typeahead-avatar" src="' + esc(a.avatar) + '" loading="lazy" alt="">'
            : '<span class="lf-typeahead-avatar lf-typeahead-avatar-ph"></span>';
          return '<div class="lf-typeahead-item' + (i === sel ? ' active' : '') +
            '" data-i="' + i + '" role="option">' + av +
            '<div class="lf-typeahead-text"><span class="lf-typeahead-handle">@' + esc(a.handle) + '</span>' + dn + '</div></div>';
        }).join('');
        dd.classList.toggle('open', items.length > 0);
      }
      function curVal() { return input.value.trim().replace(/^@/, ''); }
      function fetchNow() {
        var q = curVal();
        if (q.length < 1) { hide(); return; }
        if (q === last) return;
        last = q;
        fetch(TYPEAHEAD_BASE + '/xrpc/app.bsky.actor.searchActorsTypeahead?q=' +
          encodeURIComponent(q) + '&limit=' + LIMIT, { headers: { 'X-Client': TYPEAHEAD_CLIENT } })
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(d) {
            if (!d || curVal() !== q) return;
            items = (d.actors || []).slice(0, LIMIT);
            sel = items.length ? 0 : -1;
            render();
          })
          .catch(function() {});
      }
      function choose(i) { var a = items[i]; if (!a) return; hide(); onPick(a); }

      input.addEventListener('input', function() {
        if (timer) clearTimeout(timer);
        timer = setTimeout(fetchNow, DEBOUNCE_MS);
      });
      input.addEventListener('keydown', function(e) {
        if (!dd.classList.contains('open') || !items.length) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); sel = (sel + 1) % items.length; render(); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); sel = (sel - 1 + items.length) % items.length; render(); }
        else if (e.key === 'Enter') { e.preventDefault(); e.stopImmediatePropagation(); choose(sel); }
        else if (e.key === 'Escape') { e.preventDefault(); hide(); }
      });
      dd.addEventListener('mousedown', function(e) {
        var t = e.target.closest('.lf-typeahead-item');
        if (!t) return;
        e.preventDefault();
        choose(parseInt(t.getAttribute('data-i'), 10));
      });
      document.addEventListener('click', function(e) {
        if (!input.contains(e.target) && !dd.contains(e.target)) hide();
      });
      input.addEventListener('blur', function() { setTimeout(hide, 150); });
    }

    // ----- rank badge ---------------------------------------------------
    function rankBadge(rank, total) {
      if (rank == null) return '';
      var podium = rank <= 3 ? ' podium' : '';
      var medal = rank === 1 ? '🥇 ' : rank === 2 ? '🥈 ' : rank === 3 ? '🥉 ' : '';
      return '<span class="rank-badge' + podium + '">' + medal +
        '<span class="n">#' + rank + '</span>' +
        (total ? ' of ' + total : '') + '</span>';
    }

    // ----- the three lens cards -----------------------------------------
    // platform → color, mirroring the atlas/galaxy palette.
    var PLATFORM_COLORS = {
      leaflet: '#4ade80', whitewind: '#60a5fa', pckt: '#fbbf24',
      offprint: '#fb7185', greengale: '#2dd4bf', other: '#9ca3af'
    };
    function platformColor(p) { return PLATFORM_COLORS[p] || PLATFORM_COLORS.other; }

    // format a bare "YYYY-MM" without the UTC→local day-shift that fmtMonthYear
    // (which parses to UTC midnight) hits — build the date in local time.
    function fmtYM(ym) {
      var p = String(ym).split('-');
      if (p.length < 2) return ym;
      var d = new Date(Number(p[0]), Number(p[1]) - 1, 1);
      return isNaN(d) ? ym : d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
    }

    function authorCard(a) {
      var head = '<div class="card-head"><span class="card-label">as a writer</span></div>';
      if (!a || !a.totalPosts) {
        return '<div class="card">' + head + '<div class="empty">no posts indexed yet.</div></div>';
      }
      var since = fmtMonthYear(a.firstAt);
      var avg = a.totalPosts ? Math.round(a.totalWords / a.totalPosts) : 0;
      var subBits = ['<span class="hi">' + (a.totalWords || 0).toLocaleString() + '</span> words'];
      if (avg) subBits.push('~' + avg.toLocaleString() + '/post');
      if (since) subBits.push('since ' + esc(since));
      var sub = '<div class="card-sub">' + subBits.join(' · ') + '</div>';

      // where you publish — proportional platform bar + legend
      var plats = a.platforms || [];
      var bar = '';
      if (plats.length) {
        var segs = plats.map(function (p) {
          var pct = (p.count / a.totalPosts * 100).toFixed(3);
          return '<span class="pf-seg" style="width:' + pct + '%;background:' + platformColor(p.platform) +
            '" title="' + esc(p.platform) + ' · ' + p.count + '"></span>';
        }).join('');
        var legend = plats.map(function (p) {
          return '<span class="pf-leg"><span class="pf-dot" style="background:' + platformColor(p.platform) +
            '"></span>' + esc(p.platform) + ' <span class="pf-n">' + p.count + '</span></span>';
        }).join('');
        bar = '<div class="card-section"><span class="sec-label">where you publish</span>' +
          '<div class="pf-bar">' + segs + '</div><div class="pf-legend">' + legend + '</div></div>';
      }

      // posting cadence — monthly sparkline + most-active callout
      var months = a.months || [];
      var cadence = '';
      if (months.length) {
        var maxN = months.reduce(function (m, x) { return Math.max(m, x.count); }, 1);
        var most = months.reduce(function (m, x) { return x.count > m.count ? x : m; }, months[0]);
        var bars = months.map(function (x) {
          var h = Math.max(8, Math.round(x.count / maxN * 100));
          return '<span class="spark-bar" style="height:' + h + '%" title="' + esc(x.month) + ' · ' + x.count + '"></span>';
        }).join('');
        cadence = '<div class="card-section"><span class="sec-label">posting cadence</span>' +
          '<div class="spark">' + bars + '</div>' +
          '<div class="spark-cap">most active <b>' + esc(fmtYM(most.month)) +
          '</b> (' + most.count + ' post' + (most.count === 1 ? '' : 's') + ')</div></div>';
      }

      // your topics — most-used tags
      var tags = a.tags || [];
      var topics = tags.length
        ? '<div class="card-section"><span class="sec-label">your topics</span><div class="topic-row">' +
          tags.map(function (t) {
            return '<span class="topic-chip">' + esc(t.tag) + '<span class="topic-n">' + t.count + '</span></span>';
          }).join('') + '</div></div>'
        : '';

      // texture footnote
      var notes = [];
      if (a.longestWords) notes.push('longest ' + a.longestWords.toLocaleString() + ' words');
      if (a.withCover) notes.push(a.withCover + ' with cover art');
      var standalone = a.totalPosts - a.inPublication;
      if (standalone > 0) notes.push(standalone + ' standalone');
      var foot = notes.length ? '<div class="toppub"><span class="lbl">' + notes.join(' · ') + '</span></div>' : '';

      return '<div class="card">' + head +
        '<div class="metric"><span class="num" data-count="' + a.totalPosts + '">0</span>' +
        '<span class="unit">post' + (a.totalPosts === 1 ? '' : 's') + '</span></div>' +
        sub + bar + cadence + topics + foot + '</div>';
    }

    function publisherCard(p) {
      var head = '<div class="card-head"><span class="card-label">as a publisher</span>' +
        rankBadge(p.rank, p.totalOwners) + '</div>';
      if (!p.pubCount) {
        return '<div class="card">' + head +
          '<div class="empty">no publications on standard.site yet.</div></div>';
      }
      var sub = '<div class="card-sub"><span class="hi">' + p.pubCount + '</span> publication' +
        (p.pubCount === 1 ? '' : 's') + '</div>';
      var top = '';
      if (p.topPublication && p.topPublication.subscribers > 0) {
        var t = p.topPublication;
        var url = t.basePath ? 'https://' + esc(t.basePath) : '';
        var nm = esc(t.name || t.basePath || 'untitled');
        top = '<div class="toppub"><span class="lbl">most subscribed · </span>' +
          (url ? '<a href="' + url + '" target="_blank" rel="noopener">' + nm + '</a>' : nm) +
          ' <span class="lbl">(' + t.subscribers + ')</span></div>';
      }
      // placeholder for the sea of actual subscribers (filled by fetchSubscribers)
      var sea = p.totalSubscribers > 0
        ? '<div class="card-section" id="pub-sea"><span class="sec-label">who subscribes</span>' +
          '<div class="sec-loading">gathering…</div></div>'
        : '';
      return '<div class="card">' + head +
        '<div class="metric"><span class="num" data-count="' + p.totalSubscribers + '">0</span>' +
        '<span class="unit">subscriber' + (p.totalSubscribers === 1 ? '' : 's') + '</span></div>' +
        sub + top + sea + '</div>';
    }

    function curatorCard(c) {
      var head = '<div class="card-head"><span class="card-label">as a curator</span>' +
        rankBadge(c.rank, c.totalCurators) + '</div>';
      if (!c.totalRecommends) {
        return '<div class="card">' + head +
          '<div class="empty">no recommendations yet.</div></div>';
      }
      var since = fmtMonthYear(c.firstAt);
      // only surface uniqueDocs when it actually differs from the headline count
      // (recommending the same doc twice) — otherwise it just echoes the metric.
      var bits = [];
      if (c.uniqueDocs < c.totalRecommends)
        bits.push('<span class="hi">' + c.uniqueDocs + '</span> distinct document' + (c.uniqueDocs === 1 ? '' : 's'));
      if (since) bits.push('since ' + esc(since));
      var sub = bits.length ? '<div class="card-sub">' + bits.join(' · ') + '</div>' : '';
      // placeholder for the actual docs this curator recommended
      var reco = '<div class="card-section" id="cur-reco"><span class="sec-label">recommended</span>' +
        '<div class="sec-loading">gathering…</div></div>';
      return '<div class="card">' + head +
        '<div class="metric"><span class="num" data-count="' + c.totalRecommends + '">0</span>' +
        '<span class="unit">recommend' + (c.totalRecommends === 1 ? '' : 's') + '</span></div>' +
        sub + reco + '</div>';
    }

    function readerCard(r) {
      var head = '<div class="card-head"><span class="card-label">as a reader</span></div>';
      if (!r.subscriptionCount) {
        return '<div class="card">' + head +
          '<div class="empty">not subscribed to any publications yet.</div></div>';
      }
      // the metric already reads "N subscriptions" — subscriptionCount IS the
      // count of publications followed, so the subline only adds the "since".
      var since = fmtMonthYear(r.firstAt);
      var sub = since ? '<div class="card-sub">since ' + esc(since) + '</div>' : '';
      var strip = '';
      if (r.following && r.following.length) {
        strip = '<div class="follow-strip">' + r.following.map(function(f) {
          var url = f.basePath ? 'https://' + esc(f.basePath) : '#';
          var nm = esc(f.name || f.basePath || 'untitled');
          var ini = esc((f.name || f.basePath || '?').charAt(0));
          return '<a class="follow-pub" href="' + url + '" target="_blank" rel="noopener" title="' + nm + '">' +
            '<span class="follow-av" data-avatar-did="' + esc(f.ownerDid || '') + '" data-ini="' + ini + '">' +
            '<span class="ini">' + ini + '</span></span>' +
            '<span class="follow-name">' + nm + '</span></a>';
        }).join('') + '</div>';
      }
      return '<div class="card">' + head +
        '<div class="metric"><span class="num" data-count="' + r.subscriptionCount + '">0</span>' +
        '<span class="unit">subscription' + (r.subscriptionCount === 1 ? '' : 's') + '</span></div>' +
        sub + strip + '</div>';
    }

    // ----- count-up flourish (respects reduced motion) ------------------
    function animateCounts() {
      if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
        document.querySelectorAll('.num[data-count]').forEach(function(el) {
          el.textContent = el.dataset.count;
        });
        return;
      }
      document.querySelectorAll('.num[data-count]').forEach(function(el) {
        var target = parseInt(el.dataset.count, 10) || 0;
        if (target <= 0) { el.textContent = '0'; return; }
        var dur = 650, start = null;
        function step(ts) {
          if (start === null) start = ts;
          var t = Math.min(1, (ts - start) / dur);
          var eased = 1 - Math.pow(1 - t, 3);
          el.textContent = Math.round(eased * target).toLocaleString();
          if (t < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });
    }

    // ----- avatar resolution (identity header + following strip) --------
    function resolveAvatars(primaryDid) {
      var dids = [];
      if (primaryDid) dids.push(primaryDid);
      document.querySelectorAll('.follow-av[data-avatar-did]').forEach(function(el) {
        if (el.dataset.avatarDid) dids.push(el.dataset.avatarDid);
      });
      if (!dids.length || !window.LeafletIdentity) return;
      window.LeafletIdentity.resolveProfiles(dids).then(function(profiles) {
        // identity header
        var p = primaryDid ? profiles.get(primaryDid) : null;
        var av = document.getElementById('who-avatar');
        var nameEl = document.getElementById('who-name');
        var handleEl = document.getElementById('who-handle');
        if (p) {
          if (av) {
            av.classList.remove('loading');
            // initial first; swap to the image only once it actually loads, so
            // a 404'd avatar keeps the initial instead of flashing/going blank.
            av.innerHTML = '<span class="ini">' + esc((p.handle || '?').charAt(0)) + '</span>';
            if (p.avatar) {
              var img = new Image(); img.alt = '';
              img.onload = function() { av.innerHTML = ''; av.appendChild(img); };
              img.src = p.avatar;
            }
          }
          if (nameEl && p.displayName) nameEl.textContent = p.displayName;
          if (handleEl && p.handle) {
            handleEl.innerHTML = '<a href="' + esc(profileUrl(primaryDid)) + '" data-profile-did="' + esc(primaryDid) +
              '" target="_blank" rel="noopener"><span class="at">@</span>' + esc(p.handle) + '</a>';
          }
        } else if (av) {
          av.classList.remove('loading');
          av.innerHTML = '<span class="ini">?</span>';
        }
        // following strip — only swap the initial for the image once it loads,
        // so a missing/broken avatar (e.g. a custom-domain PDS blob that 404s)
        // gracefully keeps the initial-letter circle instead of going blank.
        document.querySelectorAll('.follow-av[data-avatar-did]').forEach(function(el) {
          var fp = profiles.get(el.dataset.avatarDid);
          if (!fp || !fp.avatar) return;
          var img = new Image();
          img.alt = '';
          img.onload = function() { el.innerHTML = ''; el.appendChild(img); };
          img.onerror = function() {}; // keep the initial already in the DOM
          img.src = fp.avatar;
        });
      });
    }

    // ----- render the full digest ---------------------------------------
    function renderWrapped(data) {
      var did = data.did || '';
      var handleGuess = getParam('handle');

      // light up this person's footprint in the atlas backdrop: every pub they
      // publish + every pub they subscribe to (matched by host).
      var hosts = new Set();
      var pub = data.publisher || {};
      (pub.publications || []).forEach(function(h) { if (h) hosts.add(String(h).toLowerCase()); });
      if (pub.topPublication && pub.topPublication.basePath) hosts.add(pub.topPublication.basePath.toLowerCase());
      ((data.reader || {}).following || []).forEach(function(f) { if (f.basePath) hosts.add(f.basePath.toLowerCase()); });
      AMBIENT_MY_HOSTS = hosts.size ? hosts : null;

      lastWrappedData = data; // applyHoods() is called after the DOM is built, below
      root.innerHTML =
        '<div class="who">' +
          '<div class="who-avatar loading" id="who-avatar"></div>' +
          '<div class="who-text">' +
            '<div class="who-name" id="who-name">' + esc(handleGuess || shortDid(did)) + '</div>' +
            '<div class="who-handle" id="who-handle">' +
              (handleGuess ? '<span class="at">@</span>' + esc(handleGuess) : esc(shortDid(did))) +
            '</div>' +
            '<div class="who-hoods" id="who-hoods"></div>' +
          '</div>' +
        '</div>' +
        '<div class="cards">' +
          authorCard(data.author || {}) +
          publisherCard(data.publisher || {}) +
          curatorCard(data.curator || {}) +
          readerCard(data.reader || {}) +
        '</div>' +
        '<div class="freshness" id="freshness"></div>';
      animateCounts();
      applyHoods(); // who-hoods element now exists (re-applied when atlas-mini loads)
      resolveAvatars(did);
      fetchSubscribers(did);
      fetchRecommendedDocs(did);
      fetchFreshness();
    }

    // the digest is served from a periodic snapshot of the index, so activity
    // newer than the snapshot's watermark isn't reflected yet. surface that age
    // honestly rather than let people wonder why today's recommend is missing.
    function fetchFreshness() {
      var el = document.getElementById('freshness');
      if (!el) return;
      fetch(API_BASE + '/snapshot')
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(m) {
          if (!m || !m.source_watermark) return;
          // source_watermark is UTC, stamped without a zone — pin it to Z.
          var t = new Date(m.source_watermark.replace(' ', 'T') + 'Z');
          if (isNaN(t.getTime())) return;
          var mins = Math.max(0, Math.round((Date.now() - t.getTime()) / 60000));
          var ago = mins < 60 ? (mins + ' min') :
                    mins < 1440 ? (Math.round(mins / 60) + ' hr') :
                    (Math.round(mins / 1440) + ' day');
          el.title = 'served from a periodic snapshot — very recent posts and recommends may not appear yet';
          el.innerHTML = '<span class="dot">↻</span> updated ~' + ago + ' ago';
        })
        .catch(function() {});
    }

    // ----- publisher: the sea of actual subscribers ---------------------
    function fetchSubscribers(did) {
      var box = document.getElementById('pub-sea');
      if (!box || !did) return;
      var CAP = 60;
      fetch(API_BASE + '/subscribers?did=' + encodeURIComponent(did))
        .then(function(r) { return r.json(); })
        .then(function(rows) {
          if (!Array.isArray(rows) || !rows.length) {
            box.querySelector('.sec-loading').textContent = 'no subscribers indexed yet.';
            return;
          }
          var dids = rows.map(function(r) { return r.did; }).filter(Boolean);
          var shown = dids.slice(0, CAP);
          var extra = dids.length - shown.length;
          var html = '<span class="sec-label">who subscribes</span><div class="sea">' +
            shown.map(function(d) {
              return '<a class="sea-av" href="' + esc(profileUrl(d)) + '" data-profile-did="' + esc(d) +
                '" data-avatar-did="' + esc(d) + '" data-ini="?" target="_blank" rel="noopener" title="' + esc(shortDid(d)) + '">' +
                '<span class="ini">?</span></a>';
            }).join('') +
            (extra > 0 ? '<span class="sea-more">+' + extra + ' more</span>' : '') +
            '</div>';
          box.innerHTML = html;
          resolveSeaAvatars(box, shown);
        })
        .catch(function() {
          var l = box.querySelector('.sec-loading'); if (l) l.textContent = '';
        });
    }

    // resolve a batch of small avatars (subscriber sea); set handle title +
    // swap to image on load, keep initial otherwise.
    function resolveSeaAvatars(box, dids) {
      if (!window.LeafletIdentity || !dids.length) return;
      window.LeafletIdentity.resolveProfiles(dids).then(function(profiles) {
        box.querySelectorAll('.sea-av[data-avatar-did]').forEach(function(el) {
          var p = profiles.get(el.dataset.avatarDid);
          if (!p) return;
          if (p.handle) {
            el.title = '@' + p.handle;
            var ini = el.querySelector('.ini'); if (ini) ini.textContent = p.handle.charAt(0);
          }
          if (p.avatar) {
            var img = new Image(); img.alt = '';
            img.onload = function() { el.innerHTML = ''; el.appendChild(img); };
            img.src = p.avatar;
          }
        });
      });
    }

    // ----- curator: the actual docs recommended ------------------------
    // Two honest views: "recent" orders by when THEY recommended each doc;
    // "most recommended" by the doc's global recommend count. (The old single
    // list was labeled "recently recommended" but ordered by popularity.)
    var RECO_TABS = [
      { sort: 'recent', label: 'recent' },
      { sort: 'top', label: 'most recommended' }
    ];

    function recoItemHtml(d) {
      var title = esc(d.title || 'untitled');
      var url = d.url || '';
      var titleHtml = url
        ? '<a href="' + esc(url) + '" target="_blank" rel="noopener">' + title + '</a>'
        : title;
      var src = esc(d.publicationName || d.basePath || d.platform || '');
      var ini = esc((d.title || d.basePath || '?').charAt(0));
      var avDid = d.did || '';
      return '<div class="reco">' +
        '<a class="reco-av" href="' + esc(profileUrl(avDid)) + '" data-profile-did="' + esc(avDid) +
          '" data-avatar-did="' + esc(avDid) + '" data-ini="' + ini + '" target="_blank" rel="noopener" title="open author profile">' +
          '<span class="ini">' + ini + '</span></a>' +
        '<div class="reco-body"><div class="reco-title">' + titleHtml + '</div>' +
        (src ? '<div class="reco-meta">' + src + '</div>' : '') + '</div></div>';
    }

    function fetchRecommendedDocs(did) {
      var box = document.getElementById('cur-reco');
      if (!box || !did) return;
      var active = RECO_TABS[0].sort;

      box.innerHTML =
        '<span class="sec-label">recommended</span>' +
        '<div class="reco-tabs" role="tablist" aria-label="recommendation view">' +
          RECO_TABS.map(function(t) {
            return '<button type="button" class="reco-tab" role="tab" data-sort="' + t.sort + '"' +
              ' aria-selected="' + (t.sort === active) + '">' + t.label + '</button>';
          }).join('') +
        '</div>' +
        '<div class="reco-list-wrap"><div class="sec-loading">loading…</div></div>';

      var wrap = box.querySelector('.reco-list-wrap');

      function load(sort) {
        wrap.innerHTML = '<div class="sec-loading">loading…</div>';
        fetch(API_BASE + '/recommended?curator=' + encodeURIComponent(did) + '&sort=' + sort + '&limit=8')
          .then(function(r) { return r.json(); })
          .then(function(docs) {
            if (!Array.isArray(docs) || !docs.length) {
              wrap.innerHTML = '<div class="sec-loading">nothing here yet.</div>';
              return;
            }
            wrap.innerHTML = '<div class="reco-list">' + docs.map(recoItemHtml).join('') + '</div>';
            resolveRecoAvatars(wrap, docs.map(function(d) { return d.did; }).filter(Boolean));
          })
          .catch(function() { wrap.innerHTML = ''; });
      }

      box.querySelectorAll('.reco-tab').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var sort = btn.getAttribute('data-sort');
          if (sort === active) return;
          active = sort;
          box.querySelectorAll('.reco-tab').forEach(function(b) {
            b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
          });
          load(sort);
        });
      });

      load(active);
    }

    function resolveRecoAvatars(box, dids) {
      if (!window.LeafletIdentity || !dids.length) return;
      window.LeafletIdentity.resolveProfiles(dids).then(function(profiles) {
        box.querySelectorAll('.reco-av[data-avatar-did]').forEach(function(el) {
          var p = profiles.get(el.dataset.avatarDid);
          if (!p || !p.avatar) return;
          var img = new Image(); img.alt = '';
          img.onload = function() { el.innerHTML = ''; el.appendChild(img); };
          img.src = p.avatar;
        });
      });
    }

    // ----- ambient: a faint reading of the real atlas --------------------
    // The backdrop IS our network. atlas-mini.json is a downsampled snapshot of
    // the /atlas embedding — every dot a real document, at its true galaxy
    // coordinate, colored by platform. Dim behind the cards, it twinkles and
    // slowly breathes; the cursor parts the field like a lens and a click
    // ripples it. Concrete, not abstract. Respects prefers-reduced-motion.
    var ambientStarted = false;
    var ambientGalaxy = null; // { pts:[[x,y,platformIdx,host]], bounds:[x0,y0,x1,y1] }
    var AMBIENT_MY_HOSTS = null; // Set of the viewed person's pub hosts (their footprint)
    var AMBIENT_HOVER_CID = null; // coarse cluster id the cursor is highlighting (pill hover)

    // platform palette mirrors site/atlas.js (core colors), dark + light
    var GALAXY_DARK  = ['#4ade80', '#60a5fa', '#fbbf24', '#fb7185', '#2dd4bf', '#9ca3af'];
    var GALAXY_LIGHT = ['#16a34a', '#2563eb', '#d97706', '#e11d48', '#0d9488', '#4b5563'];

    function fetchAmbientData() {
      fetch('atlas-mini.json')
        .then(function (r) { return r.json(); })
        .then(function (g) { if (g && Array.isArray(g.pts) && g.pts.length) { ambientGalaxy = g; applyHoods(); } })
        .catch(function () {});
    }

    var lastWrappedData = null;

    // Which named atlas neighborhoods this person lives in. We map their pub
    // hosts → dominant coarse cluster (precomputed over the full atlas), then
    // surface the labels + sizes ("a huge neighborhood" = high doc count).
    function applyHoods() {
      var box = document.getElementById('who-hoods');
      var data = lastWrappedData, g = ambientGalaxy;
      if (!box || !data || !g || !g.hostCluster || !g.coarse) return;
      var labels = {};
      g.coarse.forEach(function (c) { labels[c[0]] = { label: c[1], size: c[2] }; });
      var pub = data.publisher || {};
      var hosts = (pub.publications || []).slice();
      if (pub.topPublication && pub.topPublication.basePath) hosts.push(pub.topPublication.basePath);
      var fromReading = false;
      if (!hosts.length) {
        fromReading = true;
        ((data.reader || {}).following || []).forEach(function (f) { if (f.basePath) hosts.push(f.basePath); });
      }
      var tally = {};
      hosts.forEach(function (h) {
        var cid = g.hostCluster[String(h).toLowerCase()];
        if (cid == null) return;
        tally[cid] = (tally[cid] || 0) + 1;
      });
      var arr = Object.keys(tally).map(function (cid) {
        var L = labels[cid] || { label: '?', size: 0 };
        return { cid: cid, label: L.label, size: L.size, mine: tally[cid] };
      }).sort(function (a, b) { return b.size - a.size; }).slice(0, 3); // largest neighborhood first
      if (!arr.length) { box.innerHTML = ''; return; }
      var bigMedian = 600; // a coarse "this is a large neighborhood" threshold
      box.innerHTML = '<span class="hood-label">' + (fromReading ? 'reads in' : 'lives in') + '</span>' +
        arr.map(function (h) {
          var huge = h.size >= bigMedian ? ' huge' : '';
          return '<span class="hood-chip' + huge + '" data-cid="' + esc(String(h.cid)) +
            '" title="' + h.size.toLocaleString() + ' documents in this neighborhood">' +
            '<b>' + esc(h.label) + '</b>' +
            (huge ? '<span class="tag">large</span>' : '') +
            '<span class="sz">' + h.size.toLocaleString() + '</span></span>';
        }).join('');
      box.querySelectorAll('.hood-chip').forEach(function (chip) {
        var cid = chip.getAttribute('data-cid');
        chip.addEventListener('mouseenter', function () { AMBIENT_HOVER_CID = cid; chip.classList.add('lit'); });
        chip.addEventListener('mouseleave', function () { if (AMBIENT_HOVER_CID === cid) AMBIENT_HOVER_CID = null; chip.classList.remove('lit'); });
      });
    }

    function startAmbient() {
      if (ambientStarted) return;
      var c = document.getElementById('ambient');
      if (!c || !c.getContext) return;
      ambientStarted = true;
      var ctx = c.getContext('2d');
      var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
      var dpr = Math.min(2, window.devicePixelRatio || 1);
      var W = 0, H = 0, stars = [];
      var builtFor = -1;
      // pointer state: target follows the cursor, mx/my ease toward it for a
      // gentle parallax drift; mouseOn gates the near-cursor glow.
      var mtx = 0, mty = 0, mx = 0, my = 0, mouseOn = false, overContent = false;
      // foreground blocks the atlas labels should never draw over (text/cards/form)
      var CONTENT_SEL = '.lead, .sub, #entry-form, .who, .card, .lf-typeahead-dropdown';
      var clusterCentroids = []; // [{cid,label,x,y,n}] in screen space, rebuilt on build()

      var bg = '#050505', pal = GALAXY_DARK;
      function readColors() {
        var s = getComputedStyle(document.documentElement);
        bg = (s.getPropertyValue('--bg') || '#050505').trim();
        pal = document.documentElement.getAttribute('data-theme') === 'light' ? GALAXY_LIGHT : GALAXY_DARK;
      }
      // project normalized galaxy coords to a cover-fit over the viewport
      function build() {
        stars = [];
        if (!ambientGalaxy) return;
        var b = ambientGalaxy.bounds || [0, 0, 1, 1];
        var bw = (b[2] - b[0]) || 1, bh = (b[3] - b[1]) || 1;
        var scale = Math.max(W / bw, H / bh) * 1.18; // cover + bleed
        // center on the mass centroid so the dense core sits mid-screen (behind
        // the glass cards), not the bounding-box center.
        var ctr = ambientGalaxy.center || [(b[0] + b[2]) / 2, (b[1] + b[3]) / 2];
        var ox = W / 2 - ctr[0] * scale;
        var oy = H / 2 - ctr[1] * scale;
        var pts = ambientGalaxy.pts;
        var hc = ambientGalaxy.hostCluster || {};
        var labels = {};
        (ambientGalaxy.coarse || []).forEach(function (c) { labels[c[0]] = c[1]; });
        var acc = {}; // cid -> {sx,sy,n} for on-screen cluster centroids (part B labels)
        for (var i = 0; i < pts.length; i++) {
          var p = pts[i];
          var host = p[3] || '';
          var cid = host ? hc[String(host).toLowerCase()] : null;
          if (cid == null) cid = null; else cid = String(cid);
          var sx = p[0] * scale + ox, sy = p[1] * scale + oy;
          stars.push({
            x: sx, y: sy, pi: p[2], host: host, cid: cid,
            ph: Math.random() * 6.283, sp: 0.3 + Math.random() * 0.8,
            r: 0.9 + Math.random() * 0.9
          });
          if (cid != null) {
            var a = acc[cid] || (acc[cid] = { sx: 0, sy: 0, n: 0 });
            a.sx += sx; a.sy += sy; a.n++;
          }
        }
        clusterCentroids = Object.keys(acc).map(function (cid) {
          var a = acc[cid];
          return { cid: cid, label: labels[cid] || '', x: a.sx / a.n, y: a.sy / a.n, n: a.n };
        });
        builtFor = pts.length;
      }
      function resize() {
        W = c.clientWidth; H = c.clientHeight;
        c.width = Math.max(1, W * dpr); c.height = Math.max(1, H * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        build();
      }
      function frame(t) {
        if (ambientGalaxy && builtFor !== ambientGalaxy.pts.length) build();
        ctx.clearRect(0, 0, W, H);
        if (!stars.length) { if (!reduce) requestAnimationFrame(frame); return; }
        // slow autonomous sway + a gentle parallax pull toward the cursor
        mx += (mtx - mx) * 0.06; my += (mty - my) * 0.06;
        var pull = mouseOn ? 1 : 0;
        var parX = Math.sin(t * 0.00016) * 8 + (mx - W / 2) * 0.012 * pull;
        var parY = Math.cos(t * 0.00013) * 6 + (my - H / 2) * 0.012 * pull;
        var GLOW = 130, GLOW2 = GLOW * GLOW;
        var mine = AMBIENT_MY_HOSTS;           // a person is loaded → highlight their footprint
        var litCid = AMBIENT_HOVER_CID;        // a cluster pill is hovered → light up that hood
        var dimRest = mine ? 0.38 : 1;         // when highlighting, push the rest further back
        if (litCid != null) dimRest *= 0.55;   // and dim everything else further while a hood is lit
        // first pass: the dim network
        for (var i = 0; i < stars.length; i++) {
          var s = stars[i];
          if (mine && s.host && mine.has(s.host)) continue; // drawn bright in pass 2
          var sx = s.x + parX, sy = s.y + parY;
          var inHood = litCid != null && s.cid === litCid;
          if (inHood) {
            var hp = 0.6 + 0.4 * Math.sin(t * 0.0024 + s.ph);
            var hcol = pal[s.pi] || pal[5];
            ctx.fillStyle = hcol;
            ctx.globalAlpha = 0.22 * hp;
            ctx.beginPath(); ctx.arc(sx, sy, (s.r + 1.8) * 2.4, 0, 6.283); ctx.fill();
            ctx.globalAlpha = 0.95;
            ctx.beginPath(); ctx.arc(sx, sy, s.r + 1.2, 0, 6.283); ctx.fill();
            continue;
          }
          var tw = 0.45 + 0.55 * Math.sin(t * 0.001 * s.sp + s.ph);
          var near = 0;
          if (mouseOn) {
            var dx = sx - mx, dy = sy - my, d2 = dx * dx + dy * dy;
            if (d2 < GLOW2) near = 1 - Math.sqrt(d2) / GLOW; // 0..1, softens with distance
          }
          ctx.fillStyle = pal[s.pi] || pal[5];
          if (near > 0) {
            ctx.globalAlpha = (0.20 + 0.55 * near) * (dimRest + (1 - dimRest) * near);
            ctx.beginPath(); ctx.arc(sx, sy, s.r + 2.4 * near, 0, 6.283); ctx.fill();
          } else {
            ctx.globalAlpha = (0.16 + 0.34 * tw) * dimRest;
            ctx.beginPath(); ctx.arc(sx, sy, s.r, 0, 6.283); ctx.fill();
          }
        }
        // second pass: YOUR footprint — the pubs you publish + subscribe to, lit up
        if (mine) {
          for (var j = 0; j < stars.length; j++) {
            var s2 = stars[j];
            if (!s2.host || !mine.has(s2.host)) continue;
            var x = s2.x + parX, y = s2.y + parY;
            var pulse2 = 0.6 + 0.4 * Math.sin(t * 0.0022 + s2.ph);
            var col = pal[s2.pi] || pal[5];
            ctx.globalAlpha = 0.30 * pulse2;
            ctx.fillStyle = col;
            ctx.beginPath(); ctx.arc(x, y, (s2.r + 2.2) * 3.1, 0, 6.283); ctx.fill(); // wide halo
            ctx.globalAlpha = 0.16 * pulse2;
            ctx.beginPath(); ctx.arc(x, y, (s2.r + 1.6) * 1.7, 0, 6.283); ctx.fill(); // inner glow
            ctx.globalAlpha = 0.98;
            ctx.beginPath(); ctx.arc(x, y, s2.r + 1.7, 0, 6.283); ctx.fill();          // bright core
          }
        }
        // part B: when the cursor roams the atlas (anywhere not over the foreground
        // text/cards), name the neighborhoods nearest it — a faint "you are around
        // here" readout.
        if (mouseOn && !overContent && litCid == null && clusterCentroids.length) {
          var LABEL_R = 240;
          var nearby = [];
          for (var k = 0; k < clusterCentroids.length; k++) {
            var cc = clusterCentroids[k];
            if (cc.n < 6 || !cc.label) continue; // skip tiny / unnamed hoods
            var lx = cc.x + parX, ly = cc.y + parY;
            var ddx = lx - mx, ddy = ly - my, dist = Math.sqrt(ddx * ddx + ddy * ddy);
            if (dist < LABEL_R) nearby.push({ label: cc.label, x: lx, y: ly, d: dist });
          }
          nearby.sort(function (a, b) { return a.d - b.d; });
          nearby = nearby.slice(0, 3);
          ctx.font = '600 12px ui-sans-serif, system-ui, -apple-system, sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          for (var n = 0; n < nearby.length; n++) {
            var nb = nearby[n];
            var fade = (1 - nb.d / LABEL_R) * (n === 0 ? 0.85 : 0.4);
            ctx.globalAlpha = Math.max(0, fade) * 0.55;
            ctx.fillStyle = bg;
            ctx.fillText(nb.label, nb.x + 1, nb.y + 1); // shadow for legibility over stars
            ctx.globalAlpha = Math.max(0, fade);
            ctx.fillStyle = pal[5];
            ctx.fillText(nb.label, nb.x, nb.y);
          }
          ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
        }
        ctx.globalAlpha = 1;
        if (!reduce) requestAnimationFrame(frame);
      }

      readColors(); resize();
      if (!reduce) {
        window.addEventListener('pointermove', function (e) {
          if (e.pointerType === 'touch') return;
          mtx = e.clientX; mty = e.clientY;
          if (!mouseOn) { mx = mtx; my = mty; mouseOn = true; }
          var el = document.elementFromPoint(e.clientX, e.clientY);
          overContent = !!(el && el.closest && el.closest(CONTENT_SEL));
        }, { passive: true });
        window.addEventListener('pointerleave', function () { mouseOn = false; });
        document.addEventListener('mouseleave', function () { mouseOn = false; });
      }
      window.addEventListener('resize', function () { clearTimeout(c._rt); c._rt = setTimeout(function () { readColors(); resize(); }, 150); });
      window.addEventListener('leaflet:preferred-client-changed', readColors);
      var tg = document.getElementById('theme-toggle');
      if (tg) tg.addEventListener('click', function () { setTimeout(readColors, 0); });

      if (reduce) { var iv = setInterval(function () { if (stars.length) { frame(0); clearInterval(iv); } }, 200); }
      else requestAnimationFrame(frame);
    }

    // ----- load ---------------------------------------------------------
    function load() {
      var did = getParam('did');
      var handle = getParam('handle');
      if (!did && !handle) { renderEntry(); return; }

      var key = did ? 'did' : 'handle';
      var val = did || handle;
      root.innerHTML = '<div class="status">reading the graph…</div>';

      fetch(API_BASE + '/wrapped?' + key + '=' + encodeURIComponent(val))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data || data.error) {
            root.innerHTML = '<div class="status err">' +
              esc((data && data.error) || 'could not load') + '</div>' +
              '<div class="status"><a href="/wrapped">try another handle</a></div>';
            return;
          }
          renderWrapped(data);
        })
        .catch(function() {
          root.innerHTML = '<div class="status err">network error.</div>' +
            '<div class="status"><a href="/wrapped">try again</a></div>';
        });
    }

    window.addEventListener('popstate', load);

    document.getElementById('settings-btn').addEventListener('click', function() {
      if (window.LeafletUI && window.LeafletUI.openSettings) window.LeafletUI.openSettings();
    });

    fetchAmbientData();
    startAmbient();
    load();
  </script>
</body>
</html>
