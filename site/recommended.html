  <script>
    (function() {

      if (t === 'system') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);

  <link rel="stylesheet" href="components.css?v=1779491569">
  <style>
    :root, [data-theme="dark"] {
      --bg: #050505;
      --bg-subtle: #0d0d0d;
      --bg-hover: #141414;
      --border: #1d1d1d;
      --border-subtle: #161616;
      --border-focus: #2a2a2a;
      --text: #ccc;
      --text-bright: #fff;
      --text-secondary: #888;
      --text-dim: #555;
      --text-muted: #444;
      --accent: #2a9d5c;
      --accent-dim: #1B7340;
      --podium-bg: rgba(42, 157, 92, 0.04);
      --podium-border: rgba(42, 157, 92, 0.25);
    }
    [data-theme="light"] {
      --bg: #f5f5f0;
      --bg-subtle: #eee;
      --bg-hover: #e4e4e0;
      --border: #ddd;
      --border-subtle: #ccc;
      --border-focus: #bbb;
      --text: #333;
      --text-bright: #111;
      --text-secondary: #555;
      --text-dim: #888;
      --text-muted: #999;
      --accent: #1B7340;
      --accent-dim: #2a9d5c;
      --podium-bg: rgba(27, 115, 64, 0.05);
      --podium-border: rgba(27, 115, 64, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.25rem 1rem 3rem;
      font-size: 14px;
      line-height: 1.6;
    }

    .container { max-width: 760px; margin: 0 auto; }

    a { color: var(--accent-dim); text-decoration: none; }
    a:hover { color: var(--accent); }

    /* header row matches atlas: title left, nav right */
    .top {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 12px;
      margin-bottom: 1.5rem;
    }
    .top h1 {
      font-size: 12px;
      font-weight: normal;
    }
    .top h1 a.title { color: var(--text-secondary); }
    .top h1 a.title:hover { color: var(--text-bright); }
    .top .dim { color: var(--text-dim); }
    .top .nav {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 11px;
    }
    .top .nav a {
      color: var(--text-dim);
      padding: 0.3rem 0.1rem;
    }
    .top .nav a:hover { color: var(--text-bright); }
    .theme-toggle {
      cursor: pointer;
      color: var(--text-dim);
      user-select: none;
      padding: 0.3rem 0.4rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .theme-toggle:hover { color: var(--text-secondary); }

    .lead {
      font-size: 18px;
      line-height: 1.3;
      color: var(--text-bright);
      margin-bottom: 1.5rem;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* tiny "?" affordance for the nerd-detail tooltip */
    .info {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid var(--text-muted);
      color: var(--text-muted);
      font-size: 10px;
      font-family: monospace;
      cursor: help;
      user-select: none;
    }
    .info:hover { color: var(--text-secondary); border-color: var(--text-secondary); }

    /* Invisible bridge directly below the `?` so the cursor never lands in
     * dead space when traveling from the button to the tooltip. Without it,
     * leaving the `?` even briefly drops :hover and closes the tip before
     * the cursor reaches the link. */
    .info::after {
      content: "";
      position: absolute;
      top: 100%;
      left: -16px;
      right: -16px;
      height: 14px;
    }

    .info .tip {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      width: max-content;
      max-width: min(360px, 80vw);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s;
      z-index: 5;
    }
    .info .tip-inner {
      display: block;
      padding: 0.5rem 0.65rem;
      background: var(--bg-subtle);
      border: 1px solid var(--border-focus);
      color: var(--text-secondary);
      font-size: 11px;
      line-height: 1.5;
      letter-spacing: normal;
      text-align: left;
    }
    .info .tip code { color: var(--text); }
    .info .tip a { color: var(--accent-dim); }
    .info .tip a:hover { color: var(--accent); }
    .info:hover .tip, .info:focus-within .tip { opacity: 1; pointer-events: auto; }

    .status {
      font-size: 11px;
      color: var(--text-dim);
      padding: 1rem 0;
    }

    /* leaderboard row: rank | body | score */
    .row {
      display: grid;
      grid-template-columns: 3rem 1fr auto;
      column-gap: 1rem;
      align-items: center;
      padding: 0.85rem 0.6rem;
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.12s;
    }
    .row:hover { background: var(--bg-subtle); }
    .row:last-child { border-bottom: none; }

    /* top-3 get a soft accent stripe on the left, brighter rank+heart */
    .row.podium {
      background: var(--podium-bg);
      border-left: 2px solid var(--podium-border);
      padding-left: 0.5rem;
    }
    .row.podium:hover { background: var(--bg-subtle); }
    .row.podium .rank { color: var(--accent); }
    .row.podium .heart { color: var(--accent); }

    .rank {
      font-size: 18px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
      padding-right: 0.25rem;
      line-height: 1;
    }
    .rank .hash { font-size: 12px; opacity: 0.6; margin-right: 1px; }

    .body { min-width: 0; }
    .title-line {
      color: var(--text-bright);
      font-size: 14px;
      line-height: 1.35;
      word-break: break-word;
    }
    .title-line a { color: inherit; }
    .title-line a:hover { color: var(--accent); }
    .source {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 0.25rem;
      letter-spacing: 0.01em;
    }

    /* score block: heart icon + count, baseline-aligned */
    .score {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--text-secondary);
      font-size: 16px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      white-space: nowrap;
    }
    .heart {
      width: 14px;
      height: 14px;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .heart svg { width: 100%; height: 100%; display: block; }

    .source .pub-link {
      color: inherit;
      text-decoration: none;
    }
    .source .pub-link:hover { color: var(--text-secondary); }

    /* curator-row variants — same .row grid, different body content */
    .handle-line {
      color: var(--text-bright);
      font-size: 14px;
      line-height: 1.35;
      word-break: break-word;
    }
    .handle-line a { color: inherit; }
    .handle-line a:hover { color: var(--accent); }
    .handle-line .at { color: var(--text-dim); }
    .handle-line .did-fallback { color: var(--text-dim); font-size: 12px; }
    .curator-meta {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 0.25rem;
      flex-wrap: wrap;
    }
    .curator-meta .dot { opacity: 0.5; }

    /* row "⋯" overflow button — matches .lf-row-more styling from
     * components.css but scoped tight to the leaderboard row. */
    .row .lf-row-more {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1;
      letter-spacing: 1px;
      padding: 4px 6px;
      margin-left: 6px;
      cursor: pointer;
      vertical-align: middle;
      -webkit-tap-highlight-color: transparent;
    }
    .row .lf-row-more:hover { color: var(--text-secondary); }

    /* view toggle: posts | curators — higher-order than the window picker.
     * Same axis (recommends) measured against different entities. */
    .views {
      display: flex;
      gap: 0;
      margin: 0 0 1.25rem;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      width: max-content;
      overflow: hidden;
    }
    .view-pill {
      font-size: 12px;
      padding: 5px 14px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-family: monospace;
      transition: color 0.12s, background 0.12s;
      border-right: 1px solid var(--border-subtle);
    }
    .view-pill:last-child { border-right: none; }
    .view-pill:hover { color: var(--text); background: var(--bg-subtle); }
    .view-pill.active {
      background: var(--bg-subtle);
      color: var(--text-bright);
    }

    /* window picker (since=day|week|month|year|all) */
    .windows {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin: -0.25rem 0 1rem;
    }
    .win-pill {
      font-size: 11px;
      padding: 3px 9px;
      background: var(--bg-subtle);
      border: 1px solid var(--border-subtle);
      border-radius: 3px;
      cursor: pointer;
      color: var(--text-dim);
      font-family: monospace;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .win-pill:hover {
      color: var(--text);
      border-color: var(--border-focus);
    }
    .win-pill.active {
      background: rgba(14, 165, 233, 0.18);
      border-color: #0ea5e9;
      color: #38bdf8;
    }

    .load-more {
      text-align: center;
      padding: 1.25rem 0;
    }
    .load-more button {
      background: none;
      border: 1px solid var(--border-focus);
      color: var(--text-secondary);
      font-family: monospace;
      font-size: 12px;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
    }
    .load-more button:hover { background: var(--bg-subtle); color: var(--text-bright); }

    /* tighter mobile layout */
    @media (max-width: 480px) {
      body { padding: 1rem 0.75rem 2rem; }
      .container { padding: 0; }
      .lead { font-size: 16px; margin-bottom: 1.25rem; }
      .row {
        grid-template-columns: 2.25rem 1fr auto;
        column-gap: 0.6rem;
        padding: 0.7rem 0.4rem;
      }
      .row.podium { padding-left: 0.3rem; }
      .rank { font-size: 15px; }
      .rank .hash { font-size: 10px; }
      .title-line { font-size: 13px; }
      .source { font-size: 10.5px; }
      .score { font-size: 14px; }
      .heart { width: 12px; height: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <h1>
        <a href="/" class="title">pub search</a>
        <span class="dim">/ recommended</span>
      </h1>
      <div class="nav">
        <a href="/dashboard.html">stats</a>
        <a href="/atlas.html">atlas</a>
        <button class="lf-settings-btn" id="settings-btn" aria-label="settings" title="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01A1.65 1.65 0 0 0 10 4.6V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>

    <div class="lead">
      <span id="lead-title">most-recommended posts</span>
      <span class="info" tabindex="0" aria-label="how counts are computed">?<span class="tip"><span class="tip-inner" id="lead-tip">
        counts merge <a href="https://standard.site/docs/lexicons/recommend/" target="_blank" rel="noopener"><code>site.standard.graph.recommend</code></a> and <code>pub.leaflet.interactions.recommend</code> — same idea, different lexicon per platform.
      </span></span></span>
    </div>

    <div class="windows" id="windows" role="tablist" aria-label="time window">
      <button class="win-pill" data-window="day"   role="tab">day</button>
      <button class="win-pill" data-window="week"  role="tab">week</button>
      <button class="win-pill" data-window="month" role="tab">month</button>
      <button class="win-pill" data-window="year"  role="tab">year</button>
      <button class="win-pill" data-window="all"   role="tab">all-time</button>
    </div>

    <div id="status" class="status">loading…</div>
    <div id="list"></div>
  </div>

  <script>
    var THEME_ICONS = { dark: '☾', light: '☼', system: '◑' };
    var THEME_CYCLE = ['dark', 'light', 'system'];
    var currentTheme = localStorage.getItem('theme') || 'dark';
    function applyTheme(t) {
      currentTheme = t;
      localStorage.setItem('theme', t);
      var resolved = t === 'system'
        ? (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        : t;
      document.documentElement.setAttribute('data-theme', resolved);
      var el = document.getElementById('theme-toggle');
      if (el) { el.textContent = THEME_ICONS[t]; el.title = t; }
    }
    document.getElementById('theme-toggle').textContent = THEME_ICONS[currentTheme];
    document.getElementById('theme-toggle').title = currentTheme;
    document.getElementById('theme-toggle').addEventListener('click', function() {
      applyTheme(THEME_CYCLE[(THEME_CYCLE.indexOf(currentTheme) + 1) % 3]);
    });
    matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
      if (currentTheme === 'system') applyTheme('system');
    });
  </script>
  <script src="clients.js"></script>
  <script src="ui.js"></script>
  <script>
    var API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'http://localhost:3000'
      : 'https://leaflet-search-backend.fly.dev';

    var HEART_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">'
      + '<path d="M12 21s-7-4.5-9.5-9C.83 8.5 2.5 5 6 5c2 0 3.5 1 4 2.5C10.5 6 12 5 14 5c3.5 0 5.17 3.5 3.5 7-2.5 4.5-9.5 9-9.5 9z" '
      + 'stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>';

    var PAGE_SIZE = 20;
    var WINDOWS = ['day', 'week', 'month', 'year', 'all'];
    var VIEWS = ['posts', 'curators'];
    var currentOffset = 0;
    var totalRendered = 0;
    var currentWindow = (function() {
      var p = new URLSearchParams(location.search).get('since');
      return WINDOWS.indexOf(p) >= 0 ? p : 'all';
    })();
    var currentView = (function() {
      var p = new URLSearchParams(location.search).get('view');
      return VIEWS.indexOf(p) >= 0 ? p : 'posts';
    })();
    // DID → handle cache for curator rows (and post rows' author menu)
    var handleCache = new Map();

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function shortDid(did) {
      var parts = String(did).split(':');
      var last = parts[parts.length - 1] || did;
      return last.length > 14 ? last.slice(0, 14) + '…' : last;
    }

    function relativeTime(iso) {
      if (!iso) return '';
      var t = Date.parse(iso);
      if (isNaN(t)) return '';
      var s = Math.max(1, Math.floor((Date.now() - t) / 1000));
      if (s < 60) return s + 's ago';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      if (s < 604800) return Math.floor(s / 86400) + 'd ago';
      return Math.floor(s / 604800) + 'w ago';
    }

    // Curator row — same .row grid as posts, different body content.
    // Handle is rendered as a fallback short-DID first; resolveHandles
    // upgrades to @handle once bsky's getProfiles returns.
    function curatorRowHtml(c, rank) {
      var podium = rank <= 3 ? ' podium' : '';
      var did = c.did || '';
      var handleHtml = '<span class="did-fallback">' + escapeHtml(shortDid(did)) + '</span>';
      var lastSeen = relativeTime(c.lastRecommendAt);
      var dataAttrs = did ? 'data-did="' + escapeHtml(did) + '" data-kind="curator"' : 'data-kind="curator"';
      return '<div class="row' + podium + '" ' + dataAttrs + '>' +
        '<div class="rank"><span class="hash">#</span>' + rank + '</div>' +
        '<div class="body">' +
          '<div class="handle-line">' + handleHtml + '</div>' +
          '<div class="curator-meta">' +
            (c.uniqueDocs || 0) + ' doc' + (c.uniqueDocs === 1 ? '' : 's') + ' recommended' +
            (lastSeen ? ' <span class="dot">·</span> last ' + lastSeen : '') +
            '<button class="lf-row-more" type="button" aria-label="more actions" title="more">⋯</button>' +
          '</div>' +
        '</div>' +
        '<div class="score">' +
          '<span class="heart">' + HEART_SVG + '</span>' +
          (c.totalRecommends != null ? c.totalRecommends : c.recommendCount) +
        '</div>' +
      '</div>';
    }

    function rowHtml(doc, rank) {
      var podium = rank <= 3 ? ' podium' : '';
      var title = escapeHtml(doc.title || 'Untitled');
      var url = doc.url || '';
      var source = doc.basePath || doc.publicationName || doc.platform || '';
      var extUrl = doc.basePath ? ('https://' + doc.basePath) : '';
      var titleHtml = url
        ? '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">' + title + '</a>'
        : title;
      var sourceHtml = '';
      if (source) {
        sourceHtml = extUrl
          ? '<a class="pub-link" href="' + escapeHtml(extUrl) + '" target="_blank" rel="noopener">' + escapeHtml(source) + '</a>'
          : escapeHtml(source);
      }
      // data-* mirrors what wireResultActions on the homepage uses, so the
      // shared row menu + publication menu in window.LeafletUI work as-is.
      var dataAttrs = [
        doc.did ? 'data-did="' + escapeHtml(doc.did) + '"' : '',
        doc.uri ? 'data-uri="' + escapeHtml(doc.uri) + '"' : '',
        doc.basePath ? 'data-base-path="' + escapeHtml(doc.basePath) + '"' : '',
        extUrl ? 'data-ext-url="' + escapeHtml(extUrl) + '"' : '',
      ].filter(Boolean).join(' ');
      return '<div class="row' + podium + '" ' + dataAttrs + '>' +
        '<div class="rank"><span class="hash">#</span>' + rank + '</div>' +
        '<div class="body">' +
          '<div class="title-line">' + titleHtml + '</div>' +
          (sourceHtml ? '<div class="source">' + sourceHtml + '<button class="lf-row-more" type="button" aria-label="more actions" title="more">⋯</button></div>' : '') +
        '</div>' +
        '<div class="score">' +
          '<span class="heart">' + HEART_SVG + '</span>' +
          // total (all-time) — rank already encodes the windowed signal.
          // server falls back to recommendCount if totalCount isn't sent.
          (doc.totalCount != null ? doc.totalCount : doc.recommendCount) +
        '</div>' +
      '</div>';
    }

    function renderRows(rows, append) {
      var status = document.getElementById('status');
      var list = document.getElementById('list');

      if (!append) {
        totalRendered = 0;
        list.innerHTML = '';
      }
      // strip any prior load-more (always re-add below if needed)
      var oldLoadMore = list.querySelector('.load-more');
      if (oldLoadMore) oldLoadMore.remove();

      if ((!rows || rows.length === 0) && totalRendered === 0) {
        status.textContent = 'no recommends indexed yet.';
        return;
      }
      status.textContent = '';

      var html = '';
      for (var i = 0; i < rows.length; i++) {
        html += (currentView === 'curators')
          ? curatorRowHtml(rows[i], totalRendered + i + 1)
          : rowHtml(rows[i], totalRendered + i + 1);
      }
      list.insertAdjacentHTML('beforeend', html);
      totalRendered += rows.length;

      // if the batch came back full, there might be more — offer load-more.
      // (we don't know the total upstream; a full batch is the only signal.)
      if (rows.length === PAGE_SIZE) {
        var moreHtml = '<div class="load-more"><button onclick="loadMore()">load more</button></div>';
        list.insertAdjacentHTML('beforeend', moreHtml);
      }

      if (currentView === 'curators') resolveHandles(rows);
      wireRowActions(list);
    }

    // Batch-resolve DID → handle via bsky's getProfiles, swap in-place once
    // resolved. Used by the curators view; the posts view doesn't need this
    // because rows already display titles.
    function resolveHandles(rows) {
      var dids = rows.map(function(r) { return r.did; }).filter(function(d) {
        return d && !handleCache.has(d);
      });
      if (dids.length === 0) { applyHandles(); return; }
      var chunks = [];
      for (var i = 0; i < dids.length; i += 25) chunks.push(dids.slice(i, i + 25));
      Promise.all(chunks.map(function(chunk) {
        var qs = chunk.map(function(d) { return 'actors=' + encodeURIComponent(d); }).join('&');
        return fetch('https://public.api.bsky.app/xrpc/app.bsky.actor.getProfiles?' + qs)
          .then(function(r) { return r.ok ? r.json() : null; })
          .catch(function() { return null; });
      })).then(function(results) {
        results.forEach(function(d) {
          if (!d || !d.profiles) return;
          d.profiles.forEach(function(p) { handleCache.set(p.did, p.handle); });
        });
        applyHandles();
      });
    }

    function applyHandles() {
      document.querySelectorAll('.row[data-kind="curator"][data-did]').forEach(function(row) {
        if (row.dataset.handleApplied) return;
        var did = row.dataset.did;
        var handle = handleCache.get(did);
        if (!handle) return;
        var line = row.querySelector('.handle-line');
        if (!line) return;
        line.innerHTML = '<a href="/recommended.html?author=' + encodeURIComponent(did) +
          '" title="show their authored posts">' +
          '<span class="at">@</span>' + escapeHtml(handle) + '</a>';
        row.dataset.handleApplied = '1';
        var link = line.querySelector('a');
        if (link && window.LeafletUI) {
          window.LeafletUI.bindContextMenu(link, function() {
            return window.LeafletUI.authorMenuItems(handle, did);
          });
        }
      });
    }

    // Wire the action menu on each row. Two row kinds — posts (default)
    // and curators (data-kind="curator") — get different menu builders:
    // post rows act on the doc, curator rows act on the person.
    function wireRowActions(scope) {
      if (!window.LeafletUI) return;
      scope.querySelectorAll('.row').forEach(function(row) {
        if (row.dataset.actionsWired) return;
        row.dataset.actionsWired = '1';

        var data = row.dataset;
        var moreBtn = row.querySelector('.lf-row-more');
        if (moreBtn) {
          var handler = function(e) {
            e.preventDefault();
            e.stopPropagation();
            var items;
            if (data.kind === 'curator') {
              var handle = data.did ? handleCache.get(data.did) : null;
              items = window.LeafletUI.curatorMenuItems(handle || '', data.did || '');
            } else {
              items = window.LeafletUI.rowMenuItems({
                uri: data.uri || '',
                basePath: data.basePath || '',
                handle: '',
                authorDid: data.did || '',
                externalUrl: data.extUrl || '',
              });
            }
            var rect = moreBtn.getBoundingClientRect();
            window.LeafletUI.showMenu(items, rect.right - 8, rect.bottom + 4);
          };
          moreBtn.addEventListener('click', handler);
          window.LeafletUI.longPress(moreBtn, handler);
        }

        var pubLink = row.querySelector('.pub-link');
        if (pubLink && (data.basePath || data.extUrl)) {
          window.LeafletUI.bindContextMenu(pubLink, function() {
            return window.LeafletUI.publicationMenuItems(data.basePath || '', data.extUrl || '');
          });
        }
      });
    }

    function fetchPage(offset, append) {
      var endpoint = (currentView === 'curators') ? '/curators' : '/recommended';
      var url = API_BASE + endpoint + '?limit=' + PAGE_SIZE + '&offset=' + offset
        + '&since=' + encodeURIComponent(currentWindow);
      fetch(url)
        .then(function(r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
        .then(function(data) {
          if (data && data.error) throw new Error(data.error);
          renderRows(data || [], append);
        })
        .catch(function(err) {
          document.getElementById('status').textContent = 'failed to load: ' + err.message;
        });
    }

    function loadMore() {
      currentOffset += PAGE_SIZE;
      fetchPage(currentOffset, true);
    }
    window.loadMore = loadMore;

    function syncWindowPills() {
      document.querySelectorAll('.win-pill').forEach(function(b) {
        b.classList.toggle('active', b.dataset.window === currentWindow);
      });
    }

    function syncViewPills() {
      document.querySelectorAll('.view-pill').forEach(function(b) {
        b.classList.toggle('active', b.dataset.view === currentView);
      });
      // page title + tooltip change with the view
      var lead = document.getElementById('lead-title');
      var tip = document.getElementById('lead-tip');
      if (currentView === 'curators') {
        if (lead) lead.textContent = 'top curators';
        if (tip) tip.innerHTML = 'ranks people by how many recommends they\'ve given out. counts merge <code>site.standard.graph.recommend</code> and <code>pub.leaflet.interactions.recommend</code>.';
      } else {
        if (lead) lead.textContent = 'most-recommended posts';
        if (tip) tip.innerHTML = 'counts merge <a href="https://standard.site/docs/lexicons/recommend/" target="_blank" rel="noopener"><code>site.standard.graph.recommend</code></a> and <code>pub.leaflet.interactions.recommend</code> — same idea, different lexicon per platform.';
      }
    }

    function resetAndFetch() {
      currentOffset = 0;
      totalRendered = 0;
      document.getElementById('status').textContent = 'loading…';
      document.getElementById('list').innerHTML = '';
      fetchPage(0, false);
    }

    function setWindow(w) {
      if (currentWindow === w) return;
      currentWindow = w;
      var u = new URL(location.href);
      if (w === 'all') u.searchParams.delete('since');
      else u.searchParams.set('since', w);
      history.replaceState(null, '', u);
      syncWindowPills();
      resetAndFetch();
    }

    function setView(v) {
      if (currentView === v) return;
      currentView = v;
      var u = new URL(location.href);
      if (v === 'posts') u.searchParams.delete('view');
      else u.searchParams.set('view', v);
      history.replaceState(null, '', u);
      syncViewPills();
      resetAndFetch();
    }

    document.querySelectorAll('.win-pill').forEach(function(b) {
      b.addEventListener('click', function() { setWindow(b.dataset.window); });
    });
    document.querySelectorAll('.view-pill').forEach(function(b) {
      b.addEventListener('click', function() { setView(b.dataset.view); });
    });
    syncWindowPills();
    syncViewPills();

    fetchPage(0, false);

    document.getElementById('settings-btn').addEventListener('click', function() {
      if (window.LeafletUI && window.LeafletUI.openSettings) {
        window.LeafletUI.openSettings();
      } else {
        location.href = '/';
      }
    });
  </script>
</body>
</html>
