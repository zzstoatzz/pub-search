<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>pub search / atlas</title>
  <meta name="description" content="2d semantic map of atproto publishing platforms">
  <meta property="og:title" content="pub search / atlas">
  <meta property="og:description" content="2d semantic map of atproto publishing platforms">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://pub-search.waow.tech/og-image?page=atlas">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="pub search / atlas">
  <meta name="twitter:description" content="2d semantic map of atproto publishing platforms">
  <meta name="twitter:image" content="https://pub-search.waow.tech/og-image?page=atlas">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='2' fill='%231B7340'/><circle cx='8' cy='10' r='1.5' fill='%231B7340' opacity='.6'/><circle cx='24' cy='8' r='1' fill='%231B7340' opacity='.4'/><circle cx='22' cy='22' r='1.5' fill='%231B7340' opacity='.5'/><circle cx='6' cy='24' r='1' fill='%231B7340' opacity='.3'/></svg>">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      if (t === 'system') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="atlas.css">
</head>
<body>
  <div class="loading-overlay" id="loading">
    <div class="spinner">loading atlas...</div>
  </div>

  <canvas id="canvas"></canvas>

  <div class="header">
    <h1><a href="/">pub search</a> <span class="dim">/ atlas</span></h1>
    <div class="nav">
      <form class="search-form" id="search-form">
        <input type="text" id="search-input" placeholder="search..." autocomplete="off" spellcheck="false">
      </form>
      <a href="/dashboard.html">stats</a>
      <span class="theme-toggle" id="theme-toggle"></span>
    </div>
  </div>

  <div class="tooltip" id="tooltip">
    <div class="title" id="tooltip-title"></div>
    <div class="meta" id="tooltip-meta"></div>
    <div class="platform-badge" id="tooltip-platform"></div>
  </div>

  <div class="bottom-bar">
    <div class="legend" id="legend"></div>
    <div class="stats" id="stats"></div>
  </div>

  <script>
    var currentTheme = localStorage.getItem('theme') || 'dark';
    function applyTheme(theme) {
      currentTheme = theme;
      localStorage.setItem('theme', theme);
      var resolved = theme;
      if (theme === 'system') resolved = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', resolved);
      renderThemeToggle();
      if (window.atlas) window.atlas.setDirty();
    }
    var THEME_ICONS = { dark: '\u263E', light: '\u263C', system: '\u25D1' };
    var THEME_CYCLE = ['dark', 'light', 'system'];
    function cycleTheme() {
      var next = THEME_CYCLE[(THEME_CYCLE.indexOf(currentTheme) + 1) % 3];
      applyTheme(next);
    }
    function renderThemeToggle() {
      var el = document.getElementById('theme-toggle');
      if (!el) return;
      el.textContent = THEME_ICONS[currentTheme];
      el.title = currentTheme;
      el.onclick = cycleTheme;
    }
    matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
      if (currentTheme === 'system') applyTheme('system');
    });
    renderThemeToggle();
  </script>
  <script src="atlas.js"></script>
</body>
</html>
