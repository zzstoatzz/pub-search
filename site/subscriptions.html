<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>subscriptions - pub search</title>
  <meta name="description" content="get a bsky DM when pub-search indexes a new document under a standard.site publication you follow">
  <meta name="robots" content="noindex">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      if (t === 'system') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    :root, [data-theme="dark"] {
      --bg: #0a0a0a;
      --bg-subtle: #111;
      --bg-hover: #151515;
      --border: #222;
      --border-subtle: #252525;
      --border-focus: #333;
      --text: #ccc;
      --text-bright: #fff;
      --text-secondary: #888;
      --text-dim: #555;
      --text-muted: #444;
      --error: #c44;
      --ok: #1B7340;
    }
    [data-theme="light"] {
      --bg: #f5f5f0;
      --bg-subtle: #eee;
      --bg-hover: #e4e4e0;
      --border: #ddd;
      --border-subtle: #ccc;
      --border-focus: #bbb;
      --text: #333;
      --text-bright: #111;
      --text-secondary: #555;
      --text-dim: #888;
      --text-muted: #999;
      --error: #c44;
      --ok: #1B7340;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
      font-size: 14px;
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    a { color: #1B7340; text-decoration: none; }
    a:hover { color: #2a9d5c; }

    h1 {
      font-size: 12px;
      font-weight: normal;
      margin-bottom: 1.5rem;
    }
    h1 a.title { color: var(--text-secondary); }
    h1 a.title:hover { color: var(--text-bright); }
    h1 .sep { color: var(--text-muted); margin: 0 0.25rem; }
    h1 .section { color: var(--text-dim); }

    p { margin-bottom: 1rem; color: var(--text-secondary); font-size: 13px; }
    p.hint { font-size: 12px; color: var(--text-dim); }

    code {
      font-family: monospace;
      color: #1B7340;
      background: var(--bg-subtle);
      padding: 1px 5px;
      border: 1px solid var(--border);
      font-size: 12px;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.5rem;
      font-family: monospace;
      font-size: 16px; /* 16px prevents iOS auto-zoom on focus */
      background: var(--bg-subtle);
      border: 1px solid var(--border-focus);
      color: var(--text);
    }
    input[type="text"]:focus { outline: 1px solid #1B7340; }

    /* typeahead dropdown */
    .handle-wrap { position: relative; flex: 1; }
    .typeahead {
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      right: 0;
      background: var(--bg-subtle);
      border: 1px solid var(--border-focus);
      max-height: 240px;
      overflow-y: auto;
      z-index: 10;
    }
    .typeahead:empty, .typeahead.hidden { display: none; }
    .typeahead-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.5rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .typeahead-row:last-child { border-bottom: none; }
    .typeahead-row:hover, .typeahead-row.active { background: var(--bg-hover); }
    .typeahead-avatar {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      object-fit: cover;
    }
    .typeahead-handle { color: var(--text-bright); }
    .typeahead-name { color: var(--text-dim); font-size: 11px; }

    button {
      padding: 0.5rem 1rem;
      font-family: monospace;
      font-size: 14px;
      background: var(--bg-subtle);
      border: 1px solid var(--border-focus);
      color: var(--text);
      cursor: pointer;
    }
    button:hover { background: var(--border); color: var(--text-bright); }
    button:disabled { color: var(--text-dim); cursor: not-allowed; }

    .me {
      float: right;
      font-size: 11px;
      color: var(--text-dim);
    }
    .me a { color: var(--text-dim); }
    .me a:hover { color: var(--text); }

    .status {
      font-size: 12px;
      color: var(--ok);
      margin-top: 0.5rem;
      min-height: 1.6em;
    }
    .status.err { color: var(--error); }

    .card {
      border: 1px solid var(--border);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      background: var(--bg-subtle);
    }

    .pub {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .pub:last-child { border-bottom: none; }
    .pub-meta { flex: 1; min-width: 0; }
    .pub-name {
      color: var(--text-bright);
      font-size: 13px;
      margin-bottom: 2px;
      word-break: break-word;
    }
    .pub-url {
      color: var(--text-secondary);
      font-size: 11px;
      word-break: break-all;
    }
    .pub-url a { color: var(--text-secondary); }
    .pub-url a:hover { color: #1B7340; }

    /* toggle */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border: 1px solid var(--border-focus);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .toggle .thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: left 0.15s, background 0.15s;
    }
    .toggle input:checked ~ .track { background: #1B7340; border-color: #1B7340; }
    .toggle input:checked ~ .thumb { left: 18px; background: #fff; }
    .toggle input:disabled ~ .track { opacity: 0.5; cursor: wait; }

    .test-btn {
      padding: 0.2rem 0.5rem;
      font-size: 11px;
      background: none;
      border: 1px solid var(--border-focus);
      color: var(--text-dim);
    }
    .test-btn:hover { color: var(--text); background: var(--border); }

    .empty { color: var(--text-dim); font-size: 12px; padding: 1rem 0; }

    .sub-error {
      color: var(--error);
      font-size: 11px;
      margin-top: 2px;
      word-break: break-word;
    }
    .sub-error a { color: inherit; text-decoration: underline; }
    .sub-error .raw {
      color: var(--text-dim);
      font-size: 10px;
      font-style: italic;
    }

    .bot-notice {
      font-size: 12px;
      color: var(--text-secondary);
      border-left: 2px solid var(--error);
      padding-left: 0.75rem;
    }

    .hidden { display: none !important; }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
    }
    .theme-toggle:hover { color: var(--text); background: none; }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" title="toggle theme">◐</button>

  <div class="container">
    <h1>
      <a class="title" href="/">pub search</a>
      <span class="sep">/</span>
      <span class="section">subscriptions</span>
      <span class="me" id="me"></span>
    </h1>

    <p>get a bsky DM whenever pub-search indexes a new document under a publication you follow. follows come from your <code>site.standard.graph.subscription</code> records — the same ones your standard.site reader writes when you click "subscribe".</p>

    <section id="login" class="card hidden">
      <p class="hint">sign in with your atproto handle:</p>
      <form id="login-form" style="display:flex;gap:0.5rem">
        <div class="handle-wrap">
          <input id="handle" type="text" placeholder="you.bsky.social"
                 autocomplete="off" autocapitalize="off" autocorrect="off"
                 spellcheck="false" required>
          <div id="typeahead" class="typeahead hidden" role="listbox"></div>
        </div>
        <button type="submit">sign in</button>
      </form>
      <div id="login-status" class="status"></div>
    </section>

    <section id="pubs-section" class="hidden">
      <div id="bot-notice" class="card hidden"></div>
      <div id="pubs"></div>
      <div id="pubs-status" class="status"></div>
    </section>
  </div>

  <script>
    // API_URL selection:
    //   - ?api=https://... (persisted to localStorage, for dev vs ngrok)
    //   - localStorage.pubsearch_api
    //   - same-origin if served from ngrok
    //   - default: prod backend
    (function captureApiParam() {
      const p = new URLSearchParams(location.search).get('api');
      if (p) {
        localStorage.setItem('pubsearch_api', p);
        const u = new URL(location.href);
        u.searchParams.delete('api');
        history.replaceState(null, '', u.toString());
      }
    })();
    const API_URL =
      localStorage.getItem('pubsearch_api') ||
      ((location.hostname.endsWith('ngrok.app') || location.hostname.endsWith('ngrok-free.app'))
        ? location.origin
        : 'https://api.pub-search.waow.tech');

    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.onclick = () => {
      const cur = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    };

    const $ = (id) => document.getElementById(id);
    const escapeHtml = (s) => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const show = (el) => el.classList.remove('hidden');
    const hide = (el) => el.classList.add('hidden');

    const api = (path, opts = {}) =>
      fetch(API_URL + path, { credentials: 'include', ...opts });

    async function fetchMe() {
      try { const r = await api('/api/me'); if (r.status === 200) return r.json(); } catch {}
      return null;
    }
    async function fetchPubs() {
      try { const r = await api('/api/my-publications'); if (r.ok) return r.json(); } catch {}
      return [];
    }

    const BOT_DID = 'did:plc:aywbh7hovtsqpv2pzkldmqdv';
    const BOT_HANDLE = 'pub-search.waow.tech';

    async function checkBotFollow(userDid) {
      try {
        const r = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.graph.getRelationships?actor=${encodeURIComponent(userDid)}&others=${encodeURIComponent(BOT_DID)}`);
        if (!r.ok) return null;
        const j = await r.json();
        return !!(j.relationships?.[0]?.following);
      } catch { return null; }
    }

    function renderBotNotice(follows) {
      const el = $('bot-notice');
      // quiet on the happy path — only surface when DMs are likely to be blocked
      if (follows === true) {
        el.classList.add('hidden');
        return;
      }
      el.className = 'card bot-notice warn';
      el.innerHTML = `⚠️ to receive DMs, follow <a href="https://bsky.app/profile/${escapeHtml(BOT_HANDLE)}" target="_blank" rel="noopener">@${escapeHtml(BOT_HANDLE)}</a> on bsky, or set your DM preference to "Everyone". bsky blocks DMs from strangers by default.`;
      el.classList.remove('hidden');
    }
    async function fetchSubs() {
      try { const r = await api('/api/subscriptions'); if (r.ok) return r.json(); } catch {}
      return [];
    }

    // build a lookup map: publication at-uri → subscription rkey
    // translate a raw backend lastError into a user-facing string with
    // an optional action link. matches known bsky chat error codes;
    // falls back to the raw string for anything else.
    function friendlyDeliveryError(raw) {
      if (!raw) return null;
      const botProfile = `https://bsky.app/profile/${BOT_HANDLE}`;
      if (raw.includes('NotFollowedBySender') || raw.includes('ActorNotMessageable')) {
        return {
          html: `bsky blocked this DM — <a href="${botProfile}" target="_blank" rel="noopener">follow @${escapeHtml(BOT_HANDLE)}</a> or set your bsky DM preference to "Everyone"`,
          showRaw: true,
        };
      }
      if (raw.includes('RateLimit') || raw.includes('TooManyRequests')) {
        return { html: 'bsky rate-limited us — next matching document will retry', showRaw: true };
      }
      if (raw.includes('LoginFailed') || raw.includes('BotNotConfigured')) {
        return { html: 'the pub-search bot can\'t sign in right now — this is a server problem, not yours', showRaw: true };
      }
      return { html: escapeHtml(raw), showRaw: false };
    }

    // build pubUri → sub map so each row can show its toggle state +
    // any last delivery error in one lookup.
    function indexSubs(subs) {
      const out = {};
      for (const s of subs) {
        if (s.triggerKind === 'publication') out[s.triggerValue] = s;
      }
      return out;
    }

    function renderPubs(pubs, subIndex) {
      const el = $('pubs');
      if (!pubs.length) {
        el.innerHTML = '<div class="empty">you aren\'t subscribed to any standard.site publications yet. head to any standard.site reader (e.g. a <code>pckt.blog</code> / <code>greengale.app</code> / <code>offprint.app</code> / <code>leaflet.pub</code> page) and hit subscribe.</div>';
        return;
      }
      el.innerHTML = '';
      for (const p of pubs) {
        const sub = subIndex[p.uri] || null;
        const subbed = !!sub;
        const row = document.createElement('div');
        row.className = 'pub';
        const friendly = sub?.lastError ? friendlyDeliveryError(sub.lastError) : null;
        const errorLine = friendly
          ? `<div class="sub-error">⚠️ ${friendly.html}${friendly.showRaw ? `<br><span class="raw">${escapeHtml(sub.lastError)}</span>` : ''}</div>`
          : '';

        row.innerHTML = `
          <div class="pub-meta">
            <div class="pub-name">${escapeHtml(p.name || '(untitled)')}</div>
            <div class="pub-url">${p.url ? `<a href="${escapeHtml(p.url)}" target="_blank" rel="noopener">${escapeHtml(p.url)}</a>` : escapeHtml(p.uri)}</div>
            ${errorLine}
          </div>
          <button class="test-btn" title="send a test DM">test</button>
          <label class="toggle" title="${subbed ? 'DM me off' : 'DM me on'}">
            <input type="checkbox" ${subbed ? 'checked' : ''}>
            <span class="track"></span>
            <span class="thumb"></span>
          </label>
        `;
        const checkbox = row.querySelector('input[type=checkbox]');
        const testBtn = row.querySelector('.test-btn');
        testBtn.style.display = subbed ? '' : 'none';

        checkbox.onchange = async () => {
          checkbox.disabled = true;
          const status = $('pubs-status');
          status.textContent = ''; status.classList.remove('err');
          try {
            if (checkbox.checked) {
              const r = await api('/api/subscriptions', {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({
                  triggerKind: 'publication',
                  triggerValue: p.uri,
                  label: p.name || p.url || p.uri,
                }),
              });
              const j = await r.json().catch(() => ({}));
              if (!r.ok) throw new Error(j.error || ('error ' + r.status));
              subIndex[p.uri] = { rkey: j.rkey, triggerKind: 'publication', triggerValue: p.uri };
              testBtn.style.display = '';
            } else {
              const s = subIndex[p.uri];
              if (!s) return;
              const r = await api('/api/subscriptions/' + encodeURIComponent(s.rkey), { method: 'DELETE' });
              if (!r.ok) throw new Error('delete failed');
              delete subIndex[p.uri];
              testBtn.style.display = 'none';
            }
          } catch (err) {
            status.textContent = err.message || 'failed';
            status.classList.add('err');
            checkbox.checked = !checkbox.checked; // revert
          } finally {
            checkbox.disabled = false;
          }
        };

        testBtn.onclick = async () => {
          const s = subIndex[p.uri];
          if (!s) return;
          const rkey = s.rkey;
          const status = $('pubs-status');
          testBtn.disabled = true;
          status.textContent = ''; status.classList.remove('err');
          const r = await api('/api/subscriptions/' + encodeURIComponent(rkey) + '/test', { method: 'POST' });
          const j = await r.json().catch(() => ({}));
          if (r.ok) status.textContent = 'test DM sent';
          else { status.textContent = j.error || 'test failed'; status.classList.add('err'); }
          testBtn.disabled = false;
          setTimeout(() => { status.textContent = ''; }, 3000);
        };

        el.appendChild(row);
      }
    }

    async function render() {
      const me = await fetchMe();
      const meEl = $('me');
      if (!me) {
        meEl.innerHTML = '';
        show($('login')); hide($('pubs-section'));
        return;
      }
      meEl.innerHTML = `@${escapeHtml(me.handle)} <a href="#" id="logout">(sign out)</a>`;
      $('logout').onclick = async (e) => {
        e.preventDefault();
        await api('/oauth/logout', { method: 'POST' });
        render();
      };
      hide($('login')); show($('pubs-section'));

      const [pubs, subs, follows] = await Promise.all([
        fetchPubs(), fetchSubs(), checkBotFollow(me.did),
      ]);
      renderBotNotice(follows);
      renderPubs(pubs, indexSubs(subs));
    }

    $('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const h = $('handle').value.trim();
      if (!h) return;
      window.location.href = API_URL + '/oauth/login?handle=' + encodeURIComponent(h);
    });

    // handle typeahead — hits typeahead.waow.tech (drop-in for app.bsky.actor.searchActorsTypeahead)
    (function wireTypeahead() {
      const input = $('handle');
      if (!input) return; // login form may not be present
      const box = $('typeahead');
      let debounce = 0;
      let activeIdx = -1;
      let items = [];

      const renderRows = (actors) => {
        items = actors || [];
        activeIdx = -1;
        if (!items.length) { box.classList.add('hidden'); box.innerHTML = ''; return; }
        box.innerHTML = items.map((a, i) => `
          <div class="typeahead-row" role="option" data-i="${i}">
            ${a.avatar ? `<img class="typeahead-avatar" src="${escapeHtml(a.avatar)}" alt="">` : '<div class="typeahead-avatar"></div>'}
            <span class="typeahead-handle">@${escapeHtml(a.handle)}</span>
            ${a.displayName ? `<span class="typeahead-name">${escapeHtml(a.displayName)}</span>` : ''}
          </div>
        `).join('');
        box.classList.remove('hidden');
        box.querySelectorAll('.typeahead-row').forEach(row => {
          row.addEventListener('mousedown', (e) => {
            e.preventDefault(); // keep focus on input
            select(parseInt(row.dataset.i, 10));
          });
        });
      };

      const select = (i) => {
        if (i < 0 || i >= items.length) return;
        input.value = items[i].handle;
        box.classList.add('hidden');
        items = [];
        // auto-submit — user picked, they're ready
        $('login-form').requestSubmit();
      };

      const setActive = (i) => {
        activeIdx = i;
        box.querySelectorAll('.typeahead-row').forEach((row, idx) => {
          row.classList.toggle('active', idx === i);
        });
      };

      input.addEventListener('input', () => {
        clearTimeout(debounce);
        const q = input.value.trim();
        if (q.length < 2) { renderRows([]); return; }
        debounce = setTimeout(async () => {
          try {
            const r = await fetch(`https://typeahead.waow.tech/xrpc/app.bsky.actor.searchActorsTypeahead?q=${encodeURIComponent(q)}&limit=6`);
            if (!r.ok) return;
            const j = await r.json();
            renderRows(j.actors || []);
          } catch {}
        }, 150);
      });

      input.addEventListener('keydown', (e) => {
        if (box.classList.contains('hidden') || !items.length) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); setActive(Math.min(activeIdx + 1, items.length - 1)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(Math.max(activeIdx - 1, 0)); }
        else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); select(activeIdx); }
        else if (e.key === 'Escape') { box.classList.add('hidden'); }
      });

      input.addEventListener('blur', () => {
        // slight delay so mousedown on a row can fire first
        setTimeout(() => box.classList.add('hidden'), 120);
      });
      input.addEventListener('focus', () => {
        if (items.length) box.classList.remove('hidden');
      });
    })();

    render();
  </script>
</body>
</html>
