<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pub search / stats</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='4' y='18' width='6' height='10' fill='%231B7340'/><rect x='13' y='12' width='6' height='16' fill='%231B7340'/><rect x='22' y='6' width='6' height='22' fill='%231B7340'/></svg>">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      if (t === 'system') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="dashboard.css?v=1779491569">
</head>
<body>
  <div class="container">
    <h1><a href="/" class="title">pub search</a> <span class="dim">/ stats</span></h1>

    <section>
      <div class="metrics">
        <div>
          <div class="metric-value" id="age">--</div>
          <div class="metric-label">uptime</div>
        </div>
        <div>
          <div class="metric-value" id="searches">--</div>
          <div class="metric-label">searches</div>
        </div>
        <div>
          <div class="metric-value" id="publications">--</div>
          <div class="metric-label">publications</div>
        </div>
        <div>
          <div class="metric-value" id="embeddings">--</div>
          <div class="metric-label">embeddings</div>
        </div>
        <div>
          <div class="metric-value" id="relay">--</div>
          <div class="metric-label">relay</div>
        </div>
      </div>
      <div class="live" id="live"></div>
    </section>

    <section class="ranged-section">
      <div class="ranged-header">
        <div class="section-title">traffic</div>
        <span class="range-btns" id="traffic-range">
          <button data-range="24h">24h</button>
          <button data-range="7d" class="active">7d</button>
          <button data-range="30d">30d</button>
        </span>
      </div>
      <div class="traffic-sparkline" id="traffic-sparkline"></div>
    </section>

    <section>
      <div class="section-title">documents by platform</div>
      <div class="chart-box">
        <div id="platforms"></div>
      </div>
    </section>

    <section>
      <div class="section-title">request latency</div>
      <div class="chart-box">
        <div id="timing"></div>
      </div>
    </section>

    <section class="ranged-section">
      <div class="ranged-header">
        <div class="section-title">latency history</div>
        <span class="range-btns" id="latency-range">
          <button data-range="24h" class="active">24h</button>
          <button data-range="7d">7d</button>
          <button data-range="30d">30d</button>
        </span>
      </div>
      <div class="chart-box">
        <div id="latency-history"></div>
      </div>
    </section>

    <section class="ranged-section">
      <div class="ranged-header">
        <div class="section-title">documents over time</div>
        <span class="range-btns" id="timeline-range">
          <button data-range="7d">7d</button>
          <button data-range="30d" class="active">30d</button>
          <button data-range="90d">90d</button>
          <button data-range="1y">1y</button>
          <button data-range="all">all</button>
        </span>
      </div>
      <div class="chart-box">
        <div class="timeline" id="timeline"></div>
      </div>
    </section>

    <section>
      <div class="section-title">top publications</div>
      <div class="chart-box">
        <div id="pubs"></div>
      </div>
    </section>

    <section>
      <div class="section-title">tags</div>
      <div class="tags" id="tags"></div>
    </section>

    <footer>
      <a href="/">back</a> · <a href="/atlas.html">atlas</a> · source on <a href="https://tangled.sh/@zzstoatzz.io/leaflet-search">tangled</a> · <span class="theme-toggle" id="theme-toggle"></span>
    </footer>
  </div>

  <script>
    var THEME_ICONS = { dark: '\u263E', light: '\u263C', system: '\u25D1' };
    var THEME_CYCLE = ['dark', 'light', 'system'];
    var currentTheme = localStorage.getItem('theme') || 'dark';
    function applyTheme(t) {
      currentTheme = t;
      localStorage.setItem('theme', t);
      var resolved = t === 'system'
        ? (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        : t;
      document.documentElement.setAttribute('data-theme', resolved);
      var el = document.getElementById('theme-toggle');
      if (el) { el.textContent = THEME_ICONS[t]; el.title = t; }
    }
    document.getElementById('theme-toggle').textContent = THEME_ICONS[currentTheme];
    document.getElementById('theme-toggle').title = currentTheme;
    document.getElementById('theme-toggle').addEventListener('click', function() {
      applyTheme(THEME_CYCLE[(THEME_CYCLE.indexOf(currentTheme) + 1) % 3]);
    });
    matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
      if (currentTheme === 'system') applyTheme('system');
    });
  </script>
  <script src="loading.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
