<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pub search / stats</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='4' y='18' width='6' height='10' fill='%231B7340'/><rect x='13' y='12' width='6' height='16' fill='%231B7340'/><rect x='22' y='6' width='6' height='22' fill='%231B7340'/></svg>">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      if (t === 'system') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="dashboard.css?v=1782991000">
  <link rel="stylesheet" href="components.css?v=1782991000">
</head>
<body>
  <div class="container">
    <h1><a href="/" class="title">pub search</a> <span class="dim">/ stats</span> <button class="lf-settings-btn" id="settings-btn" aria-label="settings" title="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01A1.65 1.65 0 0 0 10 4.6V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button></h1>

    <section>
      <div class="metrics">
        <div>
          <div class="metric-value" id="age">--</div>
          <div class="metric-label">uptime</div>
        </div>
        <div>
          <div class="metric-value" id="searches">--</div>
          <div class="metric-label">searches</div>
        </div>
        <div>
          <div class="metric-value" id="publications">--</div>
          <div class="metric-label">publications</div>
        </div>
        <div>
          <div class="metric-value" id="embeddings">--</div>
          <div class="metric-label">embeddings</div>
          <div class="metric-sub" id="embeddings-sub"></div>
        </div>
        <div>
          <div class="metric-value" id="freshness">--</div>
          <div class="metric-label">last indexed</div>
          <div class="metric-sub" id="freshness-sub"></div>
        </div>
        <div>
          <div class="metric-value" id="relay">--</div>
          <div class="metric-label">relay</div>
        </div>
      </div>
      <div class="live" id="live"></div>
    </section>

    <section class="ranged-section">
      <div class="ranged-header">
        <div class="section-title">traffic</div>
        <span class="range-btns" id="traffic-range">
          <button data-range="24h">24h</button>
          <button data-range="7d" class="active">7d</button>
          <button data-range="30d">30d</button>
        </span>
      </div>
      <div class="traffic-sparkline" id="traffic-sparkline"></div>
    </section>

    <section>
      <div class="section-title">documents by platform</div>
      <div class="chart-box">
        <div id="platforms"></div>
      </div>
    </section>

    <section>
      <div class="section-title">request latency</div>
      <div class="chart-box">
        <div id="timing"></div>
      </div>
    </section>

    <section class="ranged-section">
      <div class="ranged-header">
        <div class="section-title">latency history</div>
        <span class="range-btns" id="latency-range">
          <button data-range="24h" class="active">24h</button>
          <button data-range="7d">7d</button>
          <button data-range="30d">30d</button>
        </span>
      </div>
      <div class="chart-box">
        <div id="latency-history"></div>
      </div>
    </section>

    <section class="ranged-section">
      <div class="ranged-header">
        <div class="section-title">documents over time</div>
        <div class="ranged-controls">
          <span class="range-btns" id="timeline-field">
            <button data-field="indexed" class="active">indexed</button>
            <button data-field="created">created</button>
          </span>
          <span class="range-btns" id="timeline-range">
            <button data-range="7d">7d</button>
            <button data-range="30d" class="active">30d</button>
            <button data-range="90d">90d</button>
            <button data-range="1y">1y</button>
            <button data-range="all">all</button>
          </span>
        </div>
      </div>
      <div class="chart-box">
        <div class="timeline" id="timeline"></div>
      </div>
    </section>

    <section>
      <div class="section-title">top publications</div>
      <div class="chart-box">
        <div id="pubs"></div>
      </div>
    </section>

    <section>
      <div class="section-title">tags</div>
      <div class="tags" id="tags"></div>
    </section>

    <footer>
      <a href="/">back</a> · <a href="/atlas.html">atlas</a> · <a href="/labels">labels</a> · source on <a href="https://tangled.sh/@zzstoatzz.io/pub-search">tangled</a>
    </footer>
  </div>

  <script>
  </script>
  <script src="loading.js"></script>
  <script src="dashboard.js"></script>
  <script src="clients.js"></script>
  <script src="ui.js"></script>
  <script>
    document.getElementById('settings-btn').addEventListener('click', function() {
      if (window.LeafletUI && window.LeafletUI.openSettings) window.LeafletUI.openSettings();
    });
  </script>
</body>
</html>
