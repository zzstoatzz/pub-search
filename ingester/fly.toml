# leaflet-search-ingester — our own verified firehose ingester.
# Worker app: no inbound http_service; it consumes the firehose outbound and
# (currently) emits comparison logs to logfire. Cursor persists to the volume
# so it resumes across restarts.
app = 'leaflet-search-ingester'
primary_region = 'ewr'

[build]

[env]
  CURSOR_PATH = '/data/cursor'

[mounts]
  source = 'ingester_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
