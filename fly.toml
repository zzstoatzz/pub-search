# fly.toml - leaflet search slice
app = 'leaflet-search-slice'
primary_region = 'ewr'

[build]
  image = 'ghcr.io/bigmoves/quickslice:latest'

[env]
  DATABASE_URL = 'sqlite:/data/quickslice.db'
  HOST = '0.0.0.0'
  PORT = '8080'
  EXTERNAL_BASE_URL = 'https://leaflet-search-slice.fly.dev'

[[mounts]]
  source = 'leaflet_search_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
