app = 'leaflet-search-tap'
primary_region = 'ewr'

[build]
  image = 'ghcr.io/bluesky-social/indigo/tap:0.1.9'

[env]
  TAP_DATABASE_URL = 'sqlite:///data/tap.db'
  TAP_BIND = ':2480'
  TAP_RELAY_URL = 'https://relay.waow.tech'
  TAP_SIGNAL_COLLECTION = 'site.standard.document'
  TAP_COLLECTION_FILTERS = 'pub.leaflet.document,pub.leaflet.publication,pub.leaflet.interactions.recommend,site.standard.document,site.standard.publication,site.standard.graph.recommend,com.whtwnd.blog.entry'
  TAP_LOG_LEVEL = 'info'
  TAP_RESYNC_PARALLELISM = '1'
  TAP_FIREHOSE_PARALLELISM = '5'
  TAP_OUTBOX_CAPACITY = '10000'
  TAP_IDENT_CACHE_SIZE = '10000'
  TAP_CURSOR_SAVE_INTERVAL = '5s'
  TAP_REPO_FETCH_TIMEOUT = '600s'

[http_service]
  internal_port = 2480
  force_https = false
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  # 2 CPUs: 1 core can't keep pace with the firehose while also resyncing —
  # the firehose falls behind and never recovers (2026-05-27 incident, docs/tap.md).
  # keep TAP_RESYNC_PARALLELISM=1 regardless: >1 holds multiple large CARs in RAM and OOMs.
  cpus = 2

[mounts]
  source = 'leaflet_tap_data'
  destination = '/data'
