app = 'leaflet-search-tap'
primary_region = 'ewr'

[build]
  # pinned to v0.1.3 - v0.1.4 has nil pointer crash in validateCommitAndFilterOps
  # when prevData is null. see: https://github.com/bluesky-social/indigo/issues/XXX
  # TODO: upgrade when v0.1.5+ is released with fix
  image = 'ghcr.io/bluesky-social/indigo/tap@sha256:7c0774981025efe6a2dc0943942466fc60481b8a654bea65a4635981d0d415bc'

[env]
  TAP_DATABASE_URL = 'sqlite:///data/tap.db'
  TAP_BIND = ':2480'
  TAP_RELAY_URL = 'https://relay1.us-east.bsky.network'
  TAP_SIGNAL_COLLECTION = 'site.standard.document'
  TAP_COLLECTION_FILTERS = 'pub.leaflet.document,pub.leaflet.publication,site.standard.document,site.standard.publication'
  TAP_LOG_LEVEL = 'info'
  TAP_RESYNC_PARALLELISM = '1'
  TAP_FIREHOSE_PARALLELISM = '5'
  TAP_OUTBOX_CAPACITY = '10000'
  TAP_IDENT_CACHE_SIZE = '10000'
  TAP_CURSOR_SAVE_INTERVAL = '5s'
  TAP_REPO_FETCH_TIMEOUT = '600s'

[http_service]
  internal_port = 2480
  force_https = false
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'leaflet_tap_data'
  destination = '/data'
