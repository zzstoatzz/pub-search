app = 'leaflet-search-backend'
primary_region = 'ewr'

[build]

[env]
  ENABLE_SNAPSHOT_PROMOTE = '1'
  PROMOTE_CHANNEL = 'prod'
  TAP_HOST = 'leaflet-search-ingester.internal'
  TAP_PORT = '2480'
  TAP_RELAY_URL = 'https://relay.waow.tech'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# labeler XRPC (com.atproto.label.*) on its own port. Cloudflare proxies
# labeler.pub-search.waow.tech → this :8443 (fly routes by external port, so the
# labeler needs a distinct one from the main :443 app).
[[services]]
  internal_port = 3001
  protocol = 'tcp'
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 8443
    handlers = ['tls', 'http']

[mounts]
  source = 'leaflet_data'
  destination = '/data'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
