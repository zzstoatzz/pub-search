app = 'leaflet-search-backend'
primary_region = 'ewr'

[build]

[env]
  TAP_HOST = 'leaflet-search-tap.internal'
  TAP_PORT = '2480'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[mounts]
  source = 'leaflet_data'
  destination = '/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
